<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 520" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,1 L7,4 L0,7" fill="none" stroke="#475569" stroke-width="1.2"/></marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,1 L7,4 L0,7" fill="none" stroke="#ea580c" stroke-width="1.2"/></marker>
  </defs>

  <rect width="780" height="520" fill="#ffffff"/>

  <!-- Title -->
  <text x="390" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#0f172a">Current Personalization in Reranking</text>
  <text x="390" y="50" text-anchor="middle" font-size="11" fill="#64748b">200+ customers | per-customer CatBoost | 120ms CPU budget | pointwise scoring</text>

  <!-- ===== ONLINE PIPELINE ===== -->

  <!-- Query -->
  <rect x="40" y="80" width="130" height="40" rx="7" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.3"/>
  <text x="105" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#0c4a6e">Search Query</text>

  <!-- Arrow -->
  <line x1="170" y1="100" x2="210" y2="100" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- Retrieval -->
  <rect x="215" y="72" width="190" height="56" rx="7" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.3"/>
  <text x="310" y="93" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Retrieval (SABR)</text>
  <text x="310" y="108" text-anchor="middle" font-size="9" fill="#64748b">inverted index + CES kNN</text>
  <text x="310" y="122" text-anchor="middle" font-size="9" font-weight="600" fill="#ea580c">+ personalization_boost in scoring</text>

  <!-- Arrow with label -->
  <line x1="405" y1="100" x2="450" y2="100" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="428" y="90" text-anchor="middle" font-size="9" font-weight="600" fill="#dc2626">100 items</text>

  <!-- ===== RERANKER BOX ===== -->
  <rect x="455" y="70" width="295" height="240" rx="10" fill="#f8fafc" stroke="#64748b" stroke-width="1.5"/>
  <text x="475" y="92" font-size="12" font-weight="700" fill="#1e293b">Reranker Service</text>
  <text x="475" y="108" font-size="9" fill="#64748b">CatBoost pointwise | LambdaRank | per-customer model</text>

  <!-- Features block -->
  <rect x="475" y="120" width="255" height="62" rx="6" fill="#ecfdf5" stroke="#34d399" stroke-width="1"/>
  <text x="490" y="137" font-size="10" font-weight="600" fill="#166534">Standard Features</text>
  <text x="490" y="153" font-size="9" fill="#475569">behavioral: clicks, ATC, purchases (1d/7d/30d)</text>
  <text x="490" y="166" font-size="9" fill="#475569">query-item: BM25, exact match, CES distance</text>
  <text x="490" y="179" font-size="9" fill="#475569">item: price, brand, freshness, badges</text>

  <!-- Personalization block (highlighted) -->
  <rect x="475" y="192" width="255" height="52" rx="6" fill="#fff7ed" stroke="#ea580c" stroke-width="1.8"/>
  <text x="490" y="210" font-size="10" font-weight="700" fill="#c2410c">Personalization features (today)</text>
  <text x="490" y="226" font-size="9" fill="#78350f">cosine(mean(user_history_embs), item_emb)</text>
  <text x="490" y="238" font-size="9" fill="#78350f">= 1 scalar. No sequence. No attention. No context.</text>

  <!-- Transformation chain -->
  <rect x="475" y="254" width="255" height="44" rx="6" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="602" y="272" text-anchor="middle" font-size="9" fill="#991b1b">Post-model transformations:</text>
  <text x="602" y="286" text-anchor="middle" font-size="9" fill="#991b1b">RPV -> Ensemble -> Perso blend -> Relevance</text>

  <!-- Arrow down to SERP -->
  <line x1="602" y1="310" x2="602" y2="340" stroke="#475569" stroke-width="1.3" marker-end="url(#arr)"/>

  <!-- SERP -->
  <rect x="542" y="345" width="120" height="36" rx="7" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.3"/>
  <text x="602" y="368" text-anchor="middle" font-size="11" font-weight="600" fill="#0c4a6e">Final SERP</text>

  <!-- ===== USER HISTORY (left side) ===== -->
  <rect x="40" y="160" width="180" height="100" rx="7" fill="#fef9c3" stroke="#eab308" stroke-width="1.3"/>
  <text x="130" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#854d0e">User History</text>
  <text x="130" y="198" text-anchor="middle" font-size="9" fill="#64748b">DynamoDB, last 100-500 events</text>
  <text x="130" y="213" text-anchor="middle" font-size="9" fill="#64748b">click / add_to_cart / purchase</text>
  <text x="130" y="228" text-anchor="middle" font-size="9" fill="#64748b">TTL: 7-90 days per customer</text>
  <text x="130" y="253" text-anchor="middle" font-size="9" fill="#dc2626">$90K/month (global table)</text>

  <!-- Arrow from history to retrieval (perso boost) -->
  <path d="M220 195 C 260 195, 270 120, 310 128" fill="none" stroke="#ea580c" stroke-width="1.2" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <text x="258" y="150" font-size="8" fill="#ea580c">perso boost</text>

  <!-- Arrow from history to reranker perso features -->
  <path d="M220 220 C 380 220, 420 215, 473 215" fill="none" stroke="#ea580c" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arr-orange)"/>
  <text x="360" y="210" text-anchor="middle" font-size="9" font-weight="600" fill="#ea580c">mean pooling</text>

  <!-- ===== LIMITATIONS ===== -->
  <rect x="40" y="320" width="370" height="130" rx="8" fill="#ffffff" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="60" y="342" font-size="11" font-weight="700" fill="#dc2626">Key Limitations</text>
  <text x="60" y="362" font-size="10" fill="#1e293b">- Full user history compressed to 1 scalar number</text>
  <text x="60" y="380" font-size="10" fill="#1e293b">- No sequential or temporal modeling</text>
  <text x="60" y="398" font-size="10" fill="#1e293b">- Pointwise: each item scored in isolation</text>
  <text x="60" y="416" font-size="10" fill="#1e293b">- CPU only: neural models exceed 120ms budget</text>
  <text x="60" y="434" font-size="10" fill="#1e293b">- 222 customers trained independently (no sharing)</text>

  <!-- ===== BOTTOM: what we want ===== -->
  <rect x="40" y="470" width="700" height="38" rx="7" fill="#f8fafc" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="390" y="494" text-anchor="middle" font-size="10" fill="#64748b">Target: GPU service for neural inference | transformer-based user history | cross-customer pretraining | 800+ candidates</text>
</svg>
