<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 620" font-family="monospace" font-size="12">
  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,1 L7,4 L0,7" fill="none" stroke="#475569" stroke-width="1.2"/></marker>
  </defs>

  <!-- Title -->
  <text x="190" y="20" text-anchor="middle" fill="#94a3b8" font-size="10">CURRENT STATE — SERVING</text>

  <!-- Pod Request -->
  <rect x="110" y="35" width="160" height="36" rx="6" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="190" y="57" text-anchor="middle" fill="#0c4a6e" font-size="11" font-weight="bold">Pod Request</text>

  <line x1="190" y1="71" x2="190" y2="91" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Strategy Resolution -->
  <g data-click="architecture" style="cursor:pointer">
    <rect x="60" y="94" width="260" height="50" rx="6" fill="#f8fafc" stroke="#64748b"/>
    <text x="190" y="115" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="bold">Pod → Strategy Resolution</text>
    <text x="190" y="132" text-anchor="middle" fill="#64748b" font-size="9">MySQL + feature flags + A/B + REXConfig</text>
  </g>

  <line x1="190" y1="144" x2="190" y2="164" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Strategy Execution -->
  <g data-click="strategies" style="cursor:pointer">
    <rect x="10" y="167" width="360" height="130" rx="8" fill="#f8fafc" stroke="#64748b"/>
    <text x="190" y="187" text-anchor="middle" fill="#1e293b" font-size="12" font-weight="bold">Strategy Execution</text>
  </g>

  <g data-click="strategies" style="cursor:pointer">
    <rect x="25" y="197" width="155" height="28" rx="5" fill="#e7f5ff" stroke="#339af0"/>
    <text x="102" y="215" text-anchor="middle" fill="#1e293b" font-size="10">SimilarItems (graph)</text>
  </g>
  <g data-click="strategies" style="cursor:pointer">
    <rect x="195" y="197" width="155" height="28" rx="5" fill="#f3f0ff" stroke="#7c3aed"/>
    <text x="272" y="215" text-anchor="middle" fill="#1e293b" font-size="10">TopItemsStats (KV)</text>
  </g>
  <g data-click="strategies" style="cursor:pointer">
    <rect x="25" y="232" width="155" height="28" rx="5" fill="#fff9db" stroke="#f59f00"/>
    <text x="102" y="250" text-anchor="middle" fill="#1e293b" font-size="10">FilteredItems (index)</text>
  </g>
  <g data-click="strategies" style="cursor:pointer">
    <rect x="195" y="232" width="155" height="28" rx="5" fill="#e6fcf5" stroke="#2b8a3e"/>
    <text x="272" y="250" text-anchor="middle" fill="#1e293b" font-size="10">UserHistory-based</text>
  </g>
  <g data-click="rex_service" style="cursor:pointer">
    <rect x="25" y="267" width="325" height="22" rx="4" fill="#fff" stroke="#94a3b8" stroke-dasharray="4"/>
    <text x="187" y="282" text-anchor="middle" fill="#64748b" font-size="9">rex_service (FastAPI) — bestsellers + filtered only</text>
  </g>

  <line x1="190" y1="297" x2="190" y2="317" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Personalization -->
  <g data-click="personalization" style="cursor:pointer">
    <rect x="10" y="320" width="360" height="70" rx="8" fill="#f8fafc" stroke="#64748b"/>
    <text x="190" y="345" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="bold">Personalization</text>
    <text x="190" y="365" text-anchor="middle" fill="#64748b" font-size="9">PersonalizeREXTransformer (neighbor expansion + score boost)</text>
    <text x="190" y="380" text-anchor="middle" fill="#64748b" font-size="9">LinearPersonalREXTransformer (rank blending)</text>
  </g>

  <line x1="190" y1="390" x2="190" y2="410" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Post-processing -->
  <g data-click="postprocessing" style="cursor:pointer">
    <rect x="10" y="413" width="360" height="100" rx="8" fill="#f8fafc" stroke="#64748b"/>
    <text x="190" y="433" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="bold">Post-processing</text>
    <text x="190" y="455" text-anchor="middle" fill="#64748b" font-size="9">Merchandising (boost/bury/slot/blacklist/whitelist)</text>
    <text x="190" y="470" text-anchor="middle" fill="#64748b" font-size="9">Deduplication (item_id + user history exclusion)</text>
    <text x="190" y="485" text-anchor="middle" fill="#64748b" font-size="9">Diversification (round-robin by facet)</text>
    <text x="190" y="500" text-anchor="middle" fill="#64748b" font-size="9">Backfill (bestsellers gap-fill, ratio=1.0)</text>
  </g>

  <line x1="190" y1="513" x2="190" y2="533" stroke="#475569" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Response -->
  <rect x="60" y="536" width="260" height="50" rx="6" fill="#f8fafc" stroke="#64748b"/>
  <text x="190" y="557" text-anchor="middle" fill="#1e293b" font-size="11" font-weight="bold">Response</text>
  <text x="190" y="574" text-anchor="middle" fill="#64748b" font-size="9">name dedup + sponsored listings injection</text>
</svg>
