<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 240" font-family="monospace" font-size="12">
  <defs>
    <marker id="b" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0,1 L7,4 L0,7" fill="none" stroke="#475569" stroke-width="1.2"/></marker>
  </defs>

  <!-- Viewport Tracking -->
  <g data-click="viewport" style="cursor:pointer">
    <rect x="10" y="10" width="360" height="70" rx="8" fill="#f7f3eb" stroke="#64748b"/>
    <text x="190" y="40" text-anchor="middle" fill="#010101" font-size="12" font-weight="bold">Viewport Tracking</text>
    <text x="190" y="60" text-anchor="middle" fill="#64748b" font-size="10">client SDK integration for impression data</text>
  </g>

  <!-- Arrow -->
  <line x1="190" y1="80" x2="190" y2="100" stroke="#475569" stroke-width="1.5" marker-end="url(#b)"/>

  <!-- Attribution -->
  <g data-click="attribution" style="cursor:pointer">
    <rect x="10" y="105" width="360" height="70" rx="8" fill="#f7f3eb" stroke="#64748b"/>
    <text x="190" y="135" text-anchor="middle" fill="#010101" font-size="12" font-weight="bold">Attribution</text>
    <text x="190" y="155" text-anchor="middle" fill="#64748b" font-size="10">query → action → training signal</text>
  </g>
</svg>
