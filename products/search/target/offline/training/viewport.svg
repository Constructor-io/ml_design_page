<svg viewBox="0 0 680 130" style="width:100%;max-width:680px;margin:16px 0" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <rect x="20" y="10" width="300" height="50" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2"/>
  <text x="35" y="30" fill="#991b1b" font-size="10" font-weight="bold">Without viewport tracking:</text>
  <text x="35" y="46" fill="#991b1b" font-size="10">pos 30 (unseen) = negative → wrong signal</text>

  <rect x="360" y="10" width="300" height="50" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2"/>
  <text x="375" y="30" fill="#166534" font-size="10" font-weight="bold">With viewport tracking:</text>
  <text x="375" y="46" fill="#166534" font-size="10">pos 30 (unseen) = excluded → clean data</text>

  <rect x="20" y="75" width="640" height="40" rx="5" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="35" y="95" fill="#92400e" font-size="10" font-weight="bold">Impact: ~30-50% of "negatives" in typical training data are actually unobserved.</text>
  <text x="35" y="109" fill="#92400e" font-size="10">Removing them makes the model significantly more accurate at distinguishing real preferences.</text>
</svg>