<svg viewBox="0 0 700 340" style="width:100%;max-width:700px;margin:16px 0" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="12">
  <!-- Stream labels -->
  <text x="10" y="58" font-weight="bold" fill="#1e293b">II</text>
  <text x="10" y="118" font-weight="bold" fill="#1e293b">CES</text>
  <text x="10" y="178" font-weight="bold" fill="#1e293b">Perso</text>
  <text x="10" y="238" font-weight="bold" fill="#1e293b">Compl</text>
  <text x="10" y="298" font-weight="bold" fill="#1e293b">Explor</text>

  <!-- Input counts -->
  <text x="60" y="58" fill="#64748b" font-size="11">~600</text>
  <text x="60" y="118" fill="#64748b" font-size="11">~300</text>
  <text x="60" y="178" fill="#64748b" font-size="11">~200</text>
  <text x="60" y="238" fill="#64748b" font-size="11">~100</text>
  <text x="60" y="298" fill="#64748b" font-size="11">~50</text>

  <!-- Arrows in -->
  <line x1="95" y1="55" x2="140" y2="55" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="95" y1="115" x2="140" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="95" y1="175" x2="140" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="95" y1="235" x2="140" y2="235" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="95" y1="295" x2="140" y2="295" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Filter boxes -->
  <rect x="140" y="38" width="280" height="34" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <rect x="140" y="98" width="280" height="34" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <rect x="140" y="158" width="280" height="34" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <rect x="140" y="218" width="280" height="34" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <rect x="140" y="278" width="280" height="34" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4"/>

  <!-- Filter params -->
  <text x="150" y="59" fill="#92400e" font-size="11">irrel + conf&gt;0.9 → EXCLUDE</text>
  <text x="150" y="119" fill="#92400e" font-size="11">irrel + conf&gt;0.85 → EXCLUDE</text>
  <text x="150" y="179" fill="#1e40af" font-size="11">NO filter (personalized intent)</text>
  <text x="150" y="239" fill="#92400e" font-size="11">irrel + conf&gt;0.95 → EXCLUDE (strict)</text>
  <text x="150" y="299" fill="#64748b" font-size="11">NO filter (exploration protected)</text>

  <!-- Arrows out -->
  <line x1="420" y1="55" x2="470" y2="55" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="420" y1="115" x2="470" y2="115" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="420" y1="175" x2="470" y2="175" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="420" y1="235" x2="470" y2="235" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="420" y1="295" x2="470" y2="295" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output counts -->
  <text x="475" y="58" fill="#16a34a" font-size="11">~480</text>
  <text x="475" y="118" fill="#16a34a" font-size="11">~250</text>
  <text x="475" y="178" fill="#16a34a" font-size="11">~200</text>
  <text x="475" y="238" fill="#16a34a" font-size="11">~90</text>
  <text x="475" y="298" fill="#16a34a" font-size="11">~50</text>

  <!-- Merge arrow -->
  <line x1="520" y1="55" x2="560" y2="175" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="520" y1="115" x2="560" y2="175" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="520" y1="175" x2="560" y2="175" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="520" y1="235" x2="560" y2="175" stroke="#6366f1" stroke-width="1.5"/>
  <line x1="520" y1="295" x2="560" y2="175" stroke="#6366f1" stroke-width="1.5"/>

  <!-- Final box -->
  <rect x="560" y="158" width="130" height="34" rx="4" fill="#ede9fe" stroke="#6366f1" stroke-width="1.5"/>
  <text x="575" y="179" fill="#4338ca" font-size="11" font-weight="bold">→ Reranker ~1070</text>

  <!-- Arrow marker -->
  <defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#94a3b8" stroke-width="1"/></marker></defs>
</svg>