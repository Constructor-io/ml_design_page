<svg viewBox="0 0 700 220" style="width:100%;max-width:700px;margin:16px 0" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <defs><marker id="attr-arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#64748b" stroke-width="1"/></marker></defs>

  <!-- Timeline -->
  <line x1="60" y1="30" x2="60" y2="170" stroke="#cbd5e1" stroke-width="2"/>

  <circle cx="60" cy="35" r="5" fill="#0ea5e9"/>
  <text x="80" y="39" fill="#0c4a6e" font-size="10" font-weight="bold">Query: "running shoes"</text>
  <text x="300" y="39" fill="#64748b" font-size="9">→ SERP with items A, B, C at pos 1, 2, 3</text>

  <circle cx="60" cy="70" r="4" fill="#22c55e"/>
  <text x="80" y="74" fill="#166534" font-size="10">Click: item C (position 3)</text>

  <circle cx="60" cy="105" r="5" fill="#0ea5e9"/>
  <text x="80" y="109" fill="#0c4a6e" font-size="10" font-weight="bold">Query: "nike pegasus 40"</text>
  <text x="300" y="109" fill="#64748b" font-size="9">→ SERP with items C, D, E</text>

  <circle cx="60" cy="140" r="4" fill="#64748b"/>
  <text x="80" y="144" fill="#333" font-size="10">Browse product page...</text>

  <circle cx="60" cy="170" r="5" fill="#22c55e"/>
  <text x="80" y="174" fill="#166534" font-size="10">Purchase: item C</text>

  <!-- Question -->
  <rect x="350" y="130" width="320" height="56" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="365" y="150" fill="#92400e" font-size="10" font-weight="bold">Which query gets credit for the purchase?</text>
  <text x="365" y="166" fill="#92400e" font-size="10">"running shoes" or "nike pegasus 40"?</text>
  <text x="365" y="180" fill="#92400e" font-size="9">No ground truth — any strategy is a decision, not a fact.</text>
</svg>