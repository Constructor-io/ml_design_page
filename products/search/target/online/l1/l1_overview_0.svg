<svg viewBox="0 0 680 130" style="width:100%;max-width:680px;margin:16px 0" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <!-- Bad order -->
  <rect x="20" y="10" width="310" height="50" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2"/>
  <text x="35" y="30" fill="#991b1b" font-size="10" font-weight="bold">Without good ranking:</text>
  <text x="35" y="46" fill="#991b1b" font-size="10">Relevant item at #47 — never seen</text>

  <!-- Good order -->
  <rect x="350" y="10" width="310" height="50" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2"/>
  <text x="365" y="30" fill="#166534" font-size="10" font-weight="bold">With good ranking:</text>
  <text x="365" y="46" fill="#166534" font-size="10">Same item at #3 — user clicks + buys</text>

  <!-- Insight -->
  <rect x="20" y="75" width="640" height="40" rx="5" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="35" y="95" fill="#92400e" font-size="10" font-weight="bold">Most users only look at the first 10-20 results.</text>
  <text x="35" y="109" fill="#92400e" font-size="10">Getting the order right is the difference between a purchase and a bounce.</text>
</svg>