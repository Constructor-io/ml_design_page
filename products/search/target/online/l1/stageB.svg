<svg viewBox="0 0 680 320" style="width:100%;max-width:680px;margin:16px 0" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <defs>
    <marker id="stB-arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#64748b" stroke-width="1"/></marker>
  </defs>

  <!-- Input layer -->
  <rect x="20" y="20" width="180" height="44" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="40" y="38" fill="#1e40af" font-size="10" font-weight="bold">User History</text>
  <text x="40" y="52" fill="#64748b" font-size="9">offline KV-cache + today's events</text>

  <rect x="250" y="20" width="180" height="44" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2"/>
  <text x="280" y="38" fill="#166534" font-size="10" font-weight="bold">Items (from Stage A)</text>
  <text x="280" y="52" fill="#64748b" font-size="9">top-N × feature vectors</text>

  <rect x="480" y="20" width="170" height="44" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="510" y="38" fill="#92400e" font-size="10" font-weight="bold">Query Context</text>
  <text x="510" y="52" fill="#64748b" font-size="9">tokens + QU features</text>

  <!-- Encoders -->
  <line x1="110" y1="64" x2="110" y2="90" stroke="#64748b" stroke-width="1.2" marker-end="url(#stB-arr)"/>
  <line x1="340" y1="64" x2="340" y2="90" stroke="#64748b" stroke-width="1.2" marker-end="url(#stB-arr)"/>
  <line x1="565" y1="64" x2="565" y2="90" stroke="#64748b" stroke-width="1.2" marker-end="url(#stB-arr)"/>

  <rect x="20" y="92" width="180" height="36" rx="5" fill="#ede9fe" stroke="#6366f1" stroke-width="1.2"/>
  <text x="30" y="114" fill="#4338ca" font-size="10">Extend KV-cache (causal attn)</text>

  <rect x="250" y="92" width="180" height="36" rx="5" fill="#ede9fe" stroke="#6366f1" stroke-width="1.2"/>
  <text x="270" y="114" fill="#4338ca" font-size="10">Item Encoder (self-attn)</text>

  <rect x="480" y="92" width="170" height="36" rx="5" fill="#ede9fe" stroke="#6366f1" stroke-width="1.2"/>
  <text x="520" y="114" fill="#4338ca" font-size="10">Projection</text>

  <!-- Arrows to cross-attention -->
  <line x1="110" y1="128" x2="110" y2="160" stroke="#6366f1" stroke-width="1.2"/>
  <line x1="110" y1="160" x2="280" y2="180" stroke="#6366f1" stroke-width="1.2"/>
  <line x1="340" y1="128" x2="340" y2="180" stroke="#6366f1" stroke-width="1.2" marker-end="url(#stB-arr)"/>
  <line x1="565" y1="128" x2="565" y2="160" stroke="#6366f1" stroke-width="1.2"/>
  <line x1="565" y1="160" x2="400" y2="180" stroke="#6366f1" stroke-width="1.2"/>

  <!-- Cross-attention -->
  <rect x="180" y="180" width="320" height="40" rx="5" fill="#fce7f3" stroke="#ec4899" stroke-width="1.5"/>
  <text x="215" y="200" fill="#9d174d" font-size="11" font-weight="bold">Cross-Attention</text>
  <text x="215" y="214" fill="#64748b" font-size="9">items attend to user + query</text>

  <!-- Scoring head -->
  <line x1="340" y1="220" x2="340" y2="250" stroke="#64748b" stroke-width="1.2" marker-end="url(#stB-arr)"/>
  <rect x="220" y="252" width="240" height="36" rx="5" fill="#f1f5f9" stroke="#64748b" stroke-width="1.2"/>
  <text x="240" y="274" fill="#1e293b" font-size="10" font-weight="bold">Position-Aware Scoring Head</text>

  <!-- Output -->
  <line x1="340" y1="288" x2="340" y2="310" stroke="#64748b" stroke-width="1.2" marker-end="url(#stB-arr)"/>
  <text x="295" y="320" fill="#4338ca" font-size="11" font-weight="bold">Per-slot scores</text>
</svg>