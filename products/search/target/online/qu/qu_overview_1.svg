<svg viewBox="0 0 660 200" style="width:100%;max-width:660px;margin:16px 0" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <!-- Query -->
  <rect x="20" y="10" width="620" height="28" rx="4" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.2"/>
  <text x="35" y="28" fill="#0c4a6e" font-size="11">Query: <tspan font-weight="bold">"table lamp"</tspan>  →  main noun identified: <tspan font-weight="bold" fill="#dc2626">lamp</tspan></text>

  <!-- Good match -->
  <rect x="20" y="54" width="300" height="60" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2"/>
  <text x="35" y="74" fill="#166534" font-size="11" font-weight="bold">Brass Table Lamp</text>
  <text x="35" y="90" fill="#166534" font-size="10">main noun = lamp</text>
  <text x="35" y="106" fill="#22c55e" font-size="12" font-weight="bold">MATCH</text>

  <!-- Bad match -->
  <rect x="340" y="54" width="300" height="60" rx="5" fill="#fef2f2" stroke="#dc2626" stroke-width="1.2"/>
  <text x="355" y="74" fill="#991b1b" font-size="11" font-weight="bold">Table for Lamp Display</text>
  <text x="355" y="90" fill="#991b1b" font-size="10">main noun = table</text>
  <text x="355" y="106" fill="#dc2626" font-size="12" font-weight="bold">REJECTED</text>

  <!-- Explanation -->
  <rect x="20" y="130" width="620" height="56" rx="5" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="35" y="150" fill="#92400e" font-size="10" font-weight="bold">Without main noun matching:</text>
  <text x="35" y="166" fill="#92400e" font-size="10">"Table for Lamp Display" contains both "table" and "lamp" — traditional keyword search would show it.</text>
  <text x="35" y="180" fill="#92400e" font-size="10">But the user wants a LAMP, not a TABLE. Main noun matching catches this.</text>
</svg>