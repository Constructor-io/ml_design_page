<svg viewBox="0 0 720 370" style="width:100%;max-width:720px;margin:16px 0" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <defs>
    <marker id="qu-arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#64748b" stroke-width="1"/></marker>
  </defs>

  <!-- Query input -->
  <rect x="20" y="150" width="200" height="50" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="35" y="172" fill="#0c4a6e" font-size="11" font-weight="bold">User types:</text>
  <text x="35" y="189" fill="#0c4a6e" font-size="10">"red running shoes &lt;$100"</text>

  <!-- Fan-out arrows -->
  <line x1="220" y1="155" x2="270" y2="48" stroke="#64748b" stroke-width="1.2" marker-end="url(#qu-arr)"/>
  <line x1="220" y1="165" x2="270" y2="108" stroke="#64748b" stroke-width="1.2" marker-end="url(#qu-arr)"/>
  <line x1="220" y1="175" x2="270" y2="168" stroke="#64748b" stroke-width="1.2" marker-end="url(#qu-arr)"/>
  <line x1="220" y1="185" x2="270" y2="228" stroke="#64748b" stroke-width="1.2" marker-end="url(#qu-arr)"/>
  <line x1="220" y1="195" x2="270" y2="288" stroke="#64748b" stroke-width="1.2" marker-end="url(#qu-arr)"/>

  <!-- Decision 1: Intent -->
  <rect x="275" y="30" width="185" height="36" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="285" y="46" fill="#92400e" font-size="10" font-weight="bold">What type of query?</text>
  <text x="285" y="59" fill="#92400e" font-size="9">product search (not brand)</text>
  <line x1="460" y1="48" x2="490" y2="48" stroke="#64748b" stroke-width="1" marker-end="url(#qu-arr)"/>
  <text x="495" y="45" fill="#475569" font-size="10">Decides how to balance</text>
  <text x="495" y="57" fill="#475569" font-size="10">retrieval sources</text>

  <!-- Decision 2: Main Object -->
  <rect x="275" y="90" width="185" height="36" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="285" y="106" fill="#1e40af" font-size="10" font-weight="bold">What is the main object?</text>
  <text x="285" y="119" fill="#1e40af" font-size="9">shoes (not "running" or "red")</text>
  <line x1="460" y1="108" x2="490" y2="108" stroke="#64748b" stroke-width="1" marker-end="url(#qu-arr)"/>
  <text x="495" y="105" fill="#475569" font-size="10">Eliminates products that are</text>
  <text x="495" y="117" fill="#475569" font-size="10">not shoes (shoe racks, laces)</text>

  <!-- Decision 3: Category -->
  <rect x="275" y="150" width="185" height="36" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2"/>
  <text x="285" y="166" fill="#166534" font-size="10" font-weight="bold">What category?</text>
  <text x="285" y="179" fill="#166534" font-size="9">Footwear / Running</text>
  <line x1="460" y1="168" x2="490" y2="168" stroke="#64748b" stroke-width="1" marker-end="url(#qu-arr)"/>
  <text x="495" y="165" fill="#475569" font-size="10">Narrows search space to</text>
  <text x="495" y="177" fill="#475569" font-size="10">relevant department</text>

  <!-- Decision 4: Attributes -->
  <rect x="275" y="210" width="185" height="36" rx="5" fill="#ede9fe" stroke="#6366f1" stroke-width="1.2"/>
  <text x="285" y="226" fill="#4338ca" font-size="10" font-weight="bold">What constraints?</text>
  <text x="285" y="239" fill="#4338ca" font-size="9">color=red, price &lt; $100</text>
  <line x1="460" y1="228" x2="490" y2="228" stroke="#64748b" stroke-width="1" marker-end="url(#qu-arr)"/>
  <text x="495" y="225" fill="#475569" font-size="10">Applied as hard filters —</text>
  <text x="495" y="237" fill="#475569" font-size="10">only red + under $100 shown</text>

  <!-- Decision 5: Ambiguity -->
  <rect x="275" y="270" width="185" height="36" rx="5" fill="#fce7f3" stroke="#ec4899" stroke-width="1.2"/>
  <text x="285" y="286" fill="#9d174d" font-size="10" font-weight="bold">Is it ambiguous?</text>
  <text x="285" y="299" fill="#9d174d" font-size="9">No (clear intent)</text>
  <line x1="460" y1="288" x2="490" y2="288" stroke="#64748b" stroke-width="1" marker-end="url(#qu-arr)"/>
  <text x="495" y="285" fill="#475569" font-size="10">If yes: show diverse results</text>
  <text x="495" y="297" fill="#475569" font-size="10">from multiple categories</text>

  <!-- Summary box -->
  <rect x="20" y="320" width="690" height="38" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="35" y="336" fill="#1e293b" font-size="10" font-weight="bold">Result:</text>
  <text x="85" y="336" fill="#1e293b" font-size="10">search for RED SHOES in Running category, under $100</text>
  <text x="85" y="350" fill="#64748b" font-size="10">— all decided before looking at a single product.</text>
</svg>