<svg viewBox="0 0 680 200" style="width:100%;max-width:680px;margin:16px 0" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <!-- Legend -->
  <rect x="20" y="5" width="12" height="12" rx="2" fill="#e7f5ff" stroke="#339af0"/>
  <text x="36" y="15" fill="#1e293b" font-size="9">Keyword</text>
  <rect x="100" y="5" width="12" height="12" rx="2" fill="#f3f0ff" stroke="#7c3aed"/>
  <text x="116" y="15" fill="#1e293b" font-size="9">Semantic</text>
  <rect x="180" y="5" width="12" height="12" rx="2" fill="#fff9db" stroke="#f59f00"/>
  <text x="196" y="15" fill="#1e293b" font-size="9">Personalized</text>
  <rect x="280" y="5" width="12" height="12" rx="2" fill="#fff5f5" stroke="#e03131"/>
  <text x="296" y="15" fill="#1e293b" font-size="9">Complementary</text>

  <!-- Query 1: navigational -->
  <text x="20" y="50" fill="#1e293b" font-size="10" font-weight="bold">"Nike Air Max 90"</text>
  <text x="20" y="63" fill="#94a3b8" font-size="9">User knows exactly what they want</text>
  <rect x="200" y="38" width="320" height="24" rx="3" fill="#e7f5ff" stroke="#339af0" stroke-width="0.8"/>
  <text x="340" y="54" fill="#1e40af" font-size="9" text-anchor="middle">Keyword dominant</text>
  <rect x="520" y="38" width="70" height="24" rx="3" fill="#f3f0ff" stroke="#7c3aed" stroke-width="0.8"/>
  <rect x="590" y="38" width="30" height="24" rx="3" fill="#fff9db" stroke="#f59f00" stroke-width="0.8"/>
  <rect x="620" y="38" width="30" height="24" rx="3" fill="#fff5f5" stroke="#e03131" stroke-width="0.8"/>

  <!-- Query 2: exploratory -->
  <text x="20" y="100" fill="#1e293b" font-size="10" font-weight="bold">"gift for mom"</text>
  <text x="20" y="113" fill="#94a3b8" font-size="9">Vague, needs discovery</text>
  <rect x="200" y="88" width="90" height="24" rx="3" fill="#e7f5ff" stroke="#339af0" stroke-width="0.8"/>
  <rect x="290" y="88" width="160" height="24" rx="3" fill="#f3f0ff" stroke="#7c3aed" stroke-width="0.8"/>
  <text x="370" y="104" fill="#4338ca" font-size="9" text-anchor="middle">Semantic + Personal</text>
  <rect x="450" y="88" width="120" height="24" rx="3" fill="#fff9db" stroke="#f59f00" stroke-width="0.8"/>
  <rect x="570" y="88" width="80" height="24" rx="3" fill="#fff5f5" stroke="#e03131" stroke-width="0.8"/>

  <!-- Query 3: attribute -->
  <text x="20" y="150" fill="#1e293b" font-size="10" font-weight="bold">"red dress under $50"</text>
  <text x="20" y="163" fill="#94a3b8" font-size="9">Clear constraints, open to options</text>
  <rect x="200" y="138" width="160" height="24" rx="3" fill="#e7f5ff" stroke="#339af0" stroke-width="0.8"/>
  <rect x="360" y="138" width="130" height="24" rx="3" fill="#f3f0ff" stroke="#7c3aed" stroke-width="0.8"/>
  <text x="345" y="154" fill="#1e293b" font-size="9" text-anchor="middle">Balanced</text>
  <rect x="490" y="138" width="100" height="24" rx="3" fill="#fff9db" stroke="#f59f00" stroke-width="0.8"/>
  <rect x="590" y="138" width="60" height="24" rx="3" fill="#fff5f5" stroke="#e03131" stroke-width="0.8"/>

  <!-- Explanation -->
  <rect x="20" y="175" width="630" height="22" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="0.8"/>
  <text x="35" y="190" fill="#475569" font-size="9">Bar width = how many candidates from that source. Different queries → different balance → better results.</text>
</svg>