<svg viewBox="0 0 660 195" style="width:100%;max-width:660px;margin:16px 0" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <!-- Ambiguous example -->
  <rect x="20" y="10" width="200" height="36" rx="5" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.2"/>
  <text x="35" y="32" fill="#0c4a6e" font-size="11" font-weight="bold">Query: "apple"</text>

  <!-- Arrow split -->
  <line x1="220" y1="28" x2="270" y2="28" stroke="#64748b" stroke-width="1.2" marker-end="url(#qu-arr)"/>
  <rect x="272" y="10" width="160" height="36" rx="5" fill="#fce7f3" stroke="#ec4899" stroke-width="1.2"/>
  <text x="287" y="32" fill="#9d174d" font-size="10" font-weight="bold">Ambiguity: HIGH</text>

  <!-- Two interpretations -->
  <line x1="352" y1="46" x2="300" y2="75" stroke="#64748b" stroke-width="1" marker-end="url(#qu-arr)"/>
  <line x1="352" y1="46" x2="420" y2="75" stroke="#64748b" stroke-width="1" marker-end="url(#qu-arr)"/>

  <rect x="180" y="77" width="190" height="28" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="195" y="95" fill="#166534" font-size="10">Electronics (MacBook, iPhone)</text>

  <rect x="400" y="77" width="190" height="28" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="415" y="95" fill="#92400e" font-size="10">Grocery (fruit, juice, cider)</text>

  <!-- Result -->
  <rect x="20" y="125" width="620" height="60" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="35" y="145" fill="#1e293b" font-size="10" font-weight="bold">QU Decision:</text>
  <text x="35" y="161" fill="#475569" font-size="10">Show diverse results from both categories.</text>
  <text x="35" y="175" fill="#475569" font-size="10">Use personalization to prioritize (electronics user → likely MacBook).</text>
</svg>