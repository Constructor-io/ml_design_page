  <line x1="350" y1="35" x2="640" y2="65" stroke="#94a3b8" stroke-width="1" marker-end="url(#l0o-arr)"/>

  <!-- Source boxes -->
  <rect x="20" y="68" width="155" height="55" rx="5" fill="#e7f5ff" stroke="#339af0" stroke-width="1.2"/>
