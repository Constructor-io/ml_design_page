<svg viewBox="0 0 680 280" style="width:100%;max-width:680px;margin:16px 0" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <defs>
    <marker id="perso-arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#64748b" stroke-width="1"/></marker>
  </defs>

  <!-- Pre-computed -->
  <rect x="20" y="20" width="200" height="44" rx="4" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="35" y="40" fill="#1e40af" font-size="10" font-weight="bold">Pre-computed (offline)</text>
  <text x="35" y="55" fill="#64748b" font-size="9">full history (30-120d) → user_emb</text>

  <!-- Recent + session -->
  <rect x="240" y="20" width="210" height="44" rx="4" fill="#fce7f3" stroke="#ec4899" stroke-width="1.2"/>
  <text x="255" y="40" fill="#9d174d" font-size="10" font-weight="bold">Recent actions (online)</text>
  <text x="255" y="55" fill="#64748b" font-size="9">session + last days → context_emb</text>

  <!-- Query -->
  <rect x="470" y="20" width="190" height="44" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2"/>
  <text x="485" y="40" fill="#166534" font-size="10" font-weight="bold">Query</text>
  <text x="485" y="55" fill="#64748b" font-size="9">current search query → query_emb</text>

  <!-- Arrows down -->
  <line x1="120" y1="64" x2="120" y2="95" stroke="#3b82f6" stroke-width="1.2" marker-end="url(#perso-arr)"/>
  <line x1="345" y1="64" x2="345" y2="95" stroke="#ec4899" stroke-width="1.2" marker-end="url(#perso-arr)"/>
  <line x1="565" y1="64" x2="565" y2="95" stroke="#22c55e" stroke-width="1.2" marker-end="url(#perso-arr)"/>

  <!-- Encoders -->
  <rect x="30" y="97" width="180" height="28" rx="4" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
  <text x="50" y="115" fill="#1e293b" font-size="9">stored embedding (KV store)</text>

  <rect x="255" y="97" width="180" height="28" rx="4" fill="#ede9fe" stroke="#6366f1" stroke-width="1.2"/>
  <text x="280" y="115" fill="#4338ca" font-size="10">Sequence encoder</text>

  <rect x="480" y="97" width="170" height="28" rx="4" fill="#ede9fe" stroke="#6366f1" stroke-width="1.2"/>
  <text x="510" y="115" fill="#4338ca" font-size="10">Query encoder</text>

  <!-- Arrows to fusion -->
  <line x1="120" y1="125" x2="120" y2="150" stroke="#64748b" stroke-width="1"/>
  <line x1="120" y1="150" x2="300" y2="170" stroke="#64748b" stroke-width="1"/>
  <line x1="345" y1="125" x2="345" y2="170" stroke="#64748b" stroke-width="1"/>
  <line x1="565" y1="125" x2="565" y2="150" stroke="#64748b" stroke-width="1"/>
  <line x1="565" y1="150" x2="390" y2="170" stroke="#64748b" stroke-width="1"/>

  <!-- Fusion -->
  <rect x="240" y="170" width="200" height="30" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="280" y="189" fill="#92400e" font-size="10" font-weight="bold">Gated Fusion</text>

  <!-- Override annotation -->
  <text x="460" y="178" fill="#dc2626" font-size="9" font-style="italic">recent actions override long-term</text>
  <text x="460" y="190" fill="#dc2626" font-size="9" font-style="italic">if intent conflict detected</text>

  <line x1="340" y1="200" x2="340" y2="225" stroke="#64748b" stroke-width="1.2" marker-end="url(#perso-arr)"/>

  <!-- kNN -->
  <rect x="230" y="227" width="220" height="28" rx="4" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2"/>
  <text x="255" y="245" fill="#166534" font-size="10">kNN → top-K personalized items</text>

  <!-- Explanation -->
  <rect x="20" y="265" width="640" height="12" rx="3" fill="none" stroke="none"/>
  <text x="20" y="275" fill="#64748b" font-size="9">Pre-computed = cheap stable preferences. Recent actions = real-time intent. Query = what user wants now.</text>
</svg>