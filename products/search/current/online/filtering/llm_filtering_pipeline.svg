<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" font-family="monospace" font-size="11">
  <defs>
    <marker id="a" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,1 L6,3.5 L0,6" fill="none" stroke="#475569" stroke-width="1"/>
    </marker>
  </defs>

  <!-- QRL -->
  <rect x="10" y="20" width="120" height="36" rx="5" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="70" y="42" text-anchor="middle" fill="#0c4a6e" font-size="10" font-weight="bold">QRL</text>

  <line x1="130" y1="38" x2="155" y2="38" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Cross-encoder -->
  <rect x="158" y="20" width="150" height="36" rx="5" fill="#f3f0ff" stroke="#7c3aed"/>
  <text x="233" y="35" text-anchor="middle" fill="#4c1d95" font-size="10" font-weight="bold">Cross-Encoder</text>
  <text x="233" y="48" text-anchor="middle" fill="#6d28d9" font-size="9">GPU batch scoring</text>

  <line x1="308" y1="38" x2="333" y2="38" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Score -->
  <rect x="336" y="20" width="80" height="36" rx="5" fill="#f8fafc" stroke="#64748b"/>
  <text x="376" y="35" text-anchor="middle" fill="#1e293b" font-size="10">score</text>
  <text x="376" y="48" text-anchor="middle" fill="#64748b" font-size="9">per pair</text>

  <line x1="376" y1="56" x2="376" y2="80" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Guardrails -->
  <rect x="176" y="83" width="400" height="110" rx="8" fill="#fefce8" stroke="#eab308" stroke-dasharray="3"/>
  <text x="376" y="102" text-anchor="middle" fill="#854d0e" font-size="10" font-weight="bold">Guardrails (protect good items)</text>

  <text x="195" y="122" fill="#92400e" font-size="9">1. exact_match → query = product name</text>
  <text x="195" y="137" fill="#92400e" font-size="9">2. good_llm_label → LLM says Exact/Substitute</text>
  <text x="195" y="152" fill="#92400e" font-size="9">3. high_engagement → purchases/ATCs in 60d</text>
  <text x="195" y="167" fill="#92400e" font-size="9">4. blocked_query → manual allowlist</text>
  <text x="195" y="182" fill="#92400e" font-size="9">5. long_tail → top 100 items × top 2M queries</text>

  <line x1="376" y1="193" x2="376" y2="215" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Threshold -->
  <rect x="316" y="218" width="120" height="36" rx="5" fill="#fee2e2" stroke="#ef4444"/>
  <text x="376" y="233" text-anchor="middle" fill="#991b1b" font-size="10">score &lt; 0.1</text>
  <text x="376" y="246" text-anchor="middle" fill="#991b1b" font-size="9">→ blacklist</text>

  <line x1="376" y1="254" x2="376" y2="270" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>

  <!-- Keyvi -->
  <rect x="306" y="270" width="140" height="36" rx="5" fill="#dcfce7" stroke="#22c55e"/>
  <text x="376" y="285" text-anchor="middle" fill="#166534" font-size="10" font-weight="bold">keyvi → ce_service</text>
  <text x="376" y="298" text-anchor="middle" fill="#166534" font-size="9">query → [cid blacklist]</text>

  <!-- LLM labeler side input -->
  <rect x="10" y="120" width="140" height="50" rx="5" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="80" y="138" text-anchor="middle" fill="#92400e" font-size="10" font-weight="bold">vLLM Labeler</text>
  <text x="80" y="152" text-anchor="middle" fill="#92400e" font-size="9">Qwen 3 8B LoRA</text>
  <text x="80" y="164" text-anchor="middle" fill="#92400e" font-size="9">E/S/A/I labels</text>

  <line x1="150" y1="140" x2="176" y2="140" stroke="#f59e0b" stroke-width="1.2" marker-end="url(#a)" stroke-dasharray="3"/>
</svg>
