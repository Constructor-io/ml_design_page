<svg viewBox="0 0 620 160" style="width:100%;max-width:620px;margin:16px 0" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <defs>
    <marker id="icv" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#64748b" stroke-width="1"/></marker>
  </defs>

  <!-- CTR -->
  <rect x="20" y="20" width="280" height="60" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.2"/>
  <text x="160" y="40" text-anchor="middle" fill="#166534" font-size="10" font-weight="bold">CTR (all queries)</text>
  <text x="160" y="56" text-anchor="middle" fill="#166534" font-size="9">log(query-item-actions / avg)</text>
  <text x="160" y="70" text-anchor="middle" fill="#64748b" font-size="9">Stats-based, covers all query-item pairs</text>

  <!-- L2R -->
  <rect x="320" y="20" width="280" height="60" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="460" y="40" text-anchor="middle" fill="#1e40af" font-size="10" font-weight="bold">L2R (top-50K queries)</text>
  <text x="460" y="56" text-anchor="middle" fill="#1e40af" font-size="9">XGBoost: text features → score</text>
  <text x="460" y="70" text-anchor="middle" fill="#64748b" font-size="9">FastText distance (query ↔ item)</text>

  <!-- Merge -->
  <line x1="160" y1="80" x2="260" y2="105" stroke="#64748b" stroke-width="1" marker-end="url(#icv)"/>
  <line x1="460" y1="80" x2="360" y2="105" stroke="#64748b" stroke-width="1" marker-end="url(#icv)"/>

  <!-- Combined -->
  <rect x="180" y="108" width="260" height="34" rx="5" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="310" y="122" text-anchor="middle" fill="#1e293b" font-size="9" font-weight="bold">Multiple mapping_types per (query, item)</text>
  <text x="310" y="136" text-anchor="middle" fill="#64748b" font-size="9">[ctr, l2r, ctr_ss] — all accessed at query time</text>
</svg>
