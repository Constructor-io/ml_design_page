<svg viewBox="0 0 650 300" style="width:100%;max-width:650px;margin:16px 0" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <defs>
    <marker id="l0a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#64748b" stroke-width="1"/></marker>
  </defs>

  <!-- Catalog -->
  <rect x="20" y="10" width="610" height="30" rx="4" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="325" y="29" text-anchor="middle" fill="#475569" font-size="10">Full catalog (millions of items)</text>

  <!-- Query -->
  <rect x="245" y="60" width="160" height="30" rx="5" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="325" y="79" text-anchor="middle" fill="#0c4a6e" font-size="10" font-weight="bold">User query</text>

  <!-- Fan out -->
  <line x1="285" y1="90" x2="160" y2="120" stroke="#64748b" stroke-width="1" marker-end="url(#l0a)"/>
  <line x1="365" y1="90" x2="490" y2="120" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#l0a)"/>

  <!-- Keyword box -->
  <rect x="30" y="123" width="260" height="80" rx="6" fill="#e7f5ff" stroke="#339af0" stroke-width="1.2"/>
  <text x="160" y="143" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="bold">Keyword (Inverted Index)</text>
  <text x="160" y="160" text-anchor="middle" fill="#475569" font-size="9">token matching + harmonic mean scoring</text>
  <text x="160" y="175" text-anchor="middle" fill="#475569" font-size="9">+ conversion + personalization + rules</text>
  <text x="160" y="192" text-anchor="middle" fill="#339af0" font-size="9" font-weight="bold">Always active. Primary source.</text>

  <!-- CES box -->
  <rect x="360" y="123" width="260" height="80" rx="6" fill="#f3f0ff" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="490" y="143" text-anchor="middle" fill="#1e293b" font-size="10" font-weight="bold">Semantic (CES)</text>
  <text x="490" y="160" text-anchor="middle" fill="#475569" font-size="9">embedding similarity, ANN lookup</text>
  <text x="490" y="175" text-anchor="middle" fill="#475569" font-size="9">items injected back into keyword scoring</text>
  <text x="490" y="192" text-anchor="middle" fill="#7c3aed" font-size="9" font-weight="bold">Fallback: only if keyword ≤10 results</text>

  <!-- Merge -->
  <line x1="160" y1="203" x2="270" y2="233" stroke="#64748b" stroke-width="1" marker-end="url(#l0a)"/>
  <line x1="490" y1="203" x2="380" y2="233" stroke="#64748b" stroke-width="1" marker-end="url(#l0a)"/>

  <!-- Output -->
  <rect x="195" y="235" width="260" height="40" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="325" y="253" text-anchor="middle" fill="#166534" font-size="10" font-weight="bold">~100-500 candidates</text>
  <text x="325" y="268" text-anchor="middle" fill="#166534" font-size="9">scored, ready for reranking</text>
</svg>
