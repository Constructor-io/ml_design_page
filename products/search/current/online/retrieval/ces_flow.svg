<svg viewBox="0 0 620 360" style="width:100%;max-width:620px;margin:16px 0" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <defs>
    <marker id="cf" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#475569" stroke-width="1"/></marker>
  </defs>

  <text x="310" y="14" text-anchor="middle" fill="#64748b" font-size="9">CES ACTIVATION FLOW (default: run_with_second_pass=True)</text>

  <!-- Query -->
  <rect x="210" y="24" width="200" height="26" rx="4" fill="#fef3c7" stroke="#d97706"/>
  <text x="310" y="41" text-anchor="middle" fill="#92400e" font-size="10">Query → Query Service → KeySet</text>

  <line x1="310" y1="50" x2="310" y2="68" stroke="#475569" stroke-width="1.2" marker-end="url(#cf)"/>

  <!-- II 1st pass -->
  <rect x="160" y="72" width="300" height="36" rx="5" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="310" y="94" text-anchor="middle" fill="#0c4a6e" font-size="10" font-weight="bold">Inverted Index — 1st pass</text>

  <line x1="310" y1="108" x2="310" y2="128" stroke="#475569" stroke-width="1.2" marker-end="url(#cf)"/>

  <!-- Decision -->
  <polygon points="310,132 410,158 310,184 210,158" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="310" y="155" text-anchor="middle" fill="#92400e" font-size="9">II results</text>
  <text x="310" y="167" text-anchor="middle" fill="#92400e" font-size="9">&lt;= 10 ?</text>

  <!-- No branch -->
  <line x1="410" y1="158" x2="500" y2="158" stroke="#22c55e" stroke-width="1.2" marker-end="url(#cf)"/>
  <text x="450" y="150" fill="#22c55e" font-size="9">No</text>
  <rect x="500" y="145" width="100" height="26" rx="4" fill="#dcfce7" stroke="#22c55e"/>
  <text x="550" y="162" text-anchor="middle" fill="#166534" font-size="9">skip CES</text>

  <!-- Yes branch -->
  <line x1="310" y1="184" x2="310" y2="204" stroke="#dc2626" stroke-width="1.2" marker-end="url(#cf)"/>
  <text x="325" y="196" fill="#dc2626" font-size="9">Yes</text>

  <!-- CES call -->
  <rect x="160" y="208" width="300" height="36" rx="5" fill="#f3f0ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="310" y="224" text-anchor="middle" fill="#4c1d95" font-size="10" font-weight="bold">CES: GetNearestNeighbours</text>
  <text x="310" y="238" text-anchor="middle" fill="#64748b" font-size="9">embed query → ANN kNN → top-20 items</text>

  <line x1="310" y1="244" x2="310" y2="264" stroke="#475569" stroke-width="1.2" marker-end="url(#cf)"/>

  <!-- Score conversion -->
  <rect x="130" y="267" width="360" height="24" rx="4" fill="#ede9fe" stroke="#6366f1"/>
  <text x="310" y="283" text-anchor="middle" fill="#4338ca" font-size="9">score = int(IDEAL_AVG + 3*IDEAL_STD * (1 - distance)) → extra_items</text>

  <line x1="310" y1="291" x2="310" y2="311" stroke="#475569" stroke-width="1.2" marker-end="url(#cf)"/>

  <!-- II 2nd pass with extra_items -->
  <rect x="110" y="314" width="400" height="36" rx="5" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="310" y="330" text-anchor="middle" fill="#0c4a6e" font-size="10" font-weight="bold">Inverted Index — 2nd pass (II ∪ CES extra_items)</text>
  <text x="310" y="344" text-anchor="middle" fill="#64748b" font-size="9">union_iter merges both sources in same scoring pipeline</text>
</svg>
