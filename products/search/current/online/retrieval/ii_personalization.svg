<svg viewBox="0 0 620 180" style="width:100%;max-width:620px;margin:16px 0" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <defs>
    <marker id="ip" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#64748b" stroke-width="1"/></marker>
  </defs>

  <!-- User history -->
  <rect x="20" y="30" width="160" height="50" rx="5" fill="#ede9fe" stroke="#6366f1"/>
  <text x="100" y="50" text-anchor="middle" fill="#4338ca" font-size="10" font-weight="bold">User history</text>
  <text x="100" y="66" text-anchor="middle" fill="#64748b" font-size="9">purchased: item_A, item_B</text>

  <line x1="180" y1="55" x2="210" y2="55" stroke="#64748b" stroke-width="1.2" marker-end="url(#ip)"/>

  <!-- Item-item graph -->
  <rect x="215" y="20" width="200" height="70" rx="5" fill="#f3f0ff" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="315" y="40" text-anchor="middle" fill="#4c1d95" font-size="10" font-weight="bold">Item-item graph</text>
  <text x="315" y="56" text-anchor="middle" fill="#64748b" font-size="9">item_A → [item_X: 0.8, item_Y: 0.6]</text>
  <text x="315" y="70" text-anchor="middle" fill="#64748b" font-size="9">item_B → [item_Z: 0.7, item_X: 0.5]</text>
  <text x="315" y="84" text-anchor="middle" fill="#94a3b8" font-size="8">complementary strategy</text>

  <line x1="415" y1="55" x2="445" y2="55" stroke="#64748b" stroke-width="1.2" marker-end="url(#ip)"/>

  <!-- Boost output -->
  <rect x="450" y="30" width="150" height="50" rx="5" fill="#dcfce7" stroke="#22c55e"/>
  <text x="525" y="50" text-anchor="middle" fill="#166534" font-size="10" font-weight="bold">Perso boost</text>
  <text x="525" y="66" text-anchor="middle" fill="#166534" font-size="9">item_X: +boost, item_Y: +boost</text>

  <!-- Note -->
  <rect x="20" y="120" width="580" height="44" rx="4" fill="#fee2e2" stroke="#dc2626" stroke-width="1"/>
  <text x="310" y="138" text-anchor="middle" fill="#991b1b" font-size="9" font-weight="bold">Problem: additive boost mixes relevance with preference</text>
  <text x="310" y="154" text-anchor="middle" fill="#991b1b" font-size="9">Target: separate personalization stream → reranker balances relevance vs preference</text>
</svg>
