<svg viewBox="0 0 720 340" style="width:100%;max-width:720px;margin:16px 0" xmlns="http://www.w3.org/2000/svg" font-family="monospace" font-size="11">
  <defs>
    <marker id="cp-arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="none" stroke="#64748b" stroke-width="1"/></marker>
  </defs>

  <text x="360" y="16" text-anchor="middle" fill="#64748b" font-size="9">CES — OFFLINE PIPELINE (daily)</text>

  <!-- Data sources -->
  <rect x="20" y="30" width="130" height="40" rx="5" fill="#dbeafe" stroke="#3b82f6"/>
  <text x="85" y="47" text-anchor="middle" fill="#1e40af" font-size="9" font-weight="bold">Catalog (DSI)</text>
  <text x="85" y="61" text-anchor="middle" fill="#64748b" font-size="9">item texts</text>

  <rect x="170" y="30" width="130" height="40" rx="5" fill="#dcfce7" stroke="#22c55e"/>
  <text x="235" y="47" text-anchor="middle" fill="#166534" font-size="9" font-weight="bold">Behavioral logs</text>
  <text x="235" y="61" text-anchor="middle" fill="#64748b" font-size="9">clicks, ATC, purchases</text>

  <rect x="320" y="30" width="140" height="40" rx="5" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="390" y="47" text-anchor="middle" fill="#92400e" font-size="9" font-weight="bold">GigaCES pretrain</text>
  <text x="390" y="61" text-anchor="middle" fill="#64748b" font-size="9">cross-customer MiniLM</text>

  <!-- Arrows down -->
  <line x1="85" y1="70" x2="200" y2="98" stroke="#64748b" stroke-width="1" marker-end="url(#cp-arr)"/>
  <line x1="235" y1="70" x2="270" y2="98" stroke="#64748b" stroke-width="1" marker-end="url(#cp-arr)"/>
  <line x1="390" y1="70" x2="330" y2="98" stroke="#64748b" stroke-width="1" marker-end="url(#cp-arr)"/>

  <!-- Training -->
  <rect x="140" y="100" width="250" height="50" rx="6" fill="#f3f0ff" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="265" y="118" text-anchor="middle" fill="#4c1d95" font-size="10" font-weight="bold">Model Training (per-customer)</text>
  <text x="265" y="136" text-anchor="middle" fill="#64748b" font-size="9">FastText | DSSM (triplet loss) | Transformer</text>

  <!-- Model variants to the right -->
  <rect x="420" y="88" width="280" height="72" rx="5" fill="#f8fafc" stroke="#94a3b8" stroke-dasharray="3"/>
  <text x="435" y="105" fill="#475569" font-size="9" font-weight="bold">Model variants:</text>
  <text x="435" y="120" fill="#64748b" font-size="9">FastText 64d (unsupervised, baseline)</text>
  <text x="435" y="133" fill="#64748b" font-size="9">DSSM (supervised, semihard miner)</text>
  <text x="435" y="146" fill="#64748b" font-size="9">Transformer GigaCES finetune (primary)</text>

  <line x1="265" y1="150" x2="265" y2="172" stroke="#64748b" stroke-width="1.2" marker-end="url(#cp-arr)"/>

  <!-- Inference -->
  <rect x="140" y="175" width="250" height="40" rx="5" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="265" y="192" text-anchor="middle" fill="#0c4a6e" font-size="10" font-weight="bold">Embed full catalog</text>
  <text x="265" y="207" text-anchor="middle" fill="#64748b" font-size="9">item_tokens → embedding vector</text>

  <line x1="265" y1="215" x2="265" y2="235" stroke="#64748b" stroke-width="1.2" marker-end="url(#cp-arr)"/>

  <!-- ANN index build -->
  <rect x="140" y="238" width="250" height="40" rx="5" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="265" y="255" text-anchor="middle" fill="#0c4a6e" font-size="10" font-weight="bold">Build ANN index (Granne HNSW)</text>
  <text x="265" y="270" text-anchor="middle" fill="#64748b" font-size="9">ANGULAR_INT quantized, max_search=500</text>

  <line x1="265" y1="278" x2="265" y2="298" stroke="#64748b" stroke-width="1.2" marker-end="url(#cp-arr)"/>

  <!-- Package + upload -->
  <rect x="110" y="300" width="180" height="30" rx="5" fill="#dcfce7" stroke="#22c55e"/>
  <text x="200" y="319" text-anchor="middle" fill="#166534" font-size="10">tar.gz → S3</text>

  <line x1="290" y1="315" x2="320" y2="315" stroke="#64748b" stroke-width="1" marker-end="url(#cp-arr)"/>

  <!-- Register -->
  <rect x="325" y="300" width="170" height="30" rx="5" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="410" y="319" text-anchor="middle" fill="#92400e" font-size="10">Register in MySQL</text>

  <line x1="495" y1="315" x2="525" y2="315" stroke="#64748b" stroke-width="1" marker-end="url(#cp-arr)"/>

  <!-- Downloader picks up -->
  <rect x="530" y="300" width="170" height="30" rx="5" fill="#ede9fe" stroke="#6366f1"/>
  <text x="615" y="319" text-anchor="middle" fill="#4338ca" font-size="10">Downloader → CE Service</text>
</svg>
