<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" font-family="monospace" font-size="10">
  <defs>
    <marker id="ex" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,1 L5,3 L0,5" fill="none" stroke="#475569" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Input -->
  <rect x="110" y="6" width="200" height="26" rx="5" fill="#fef3c7" stroke="#d97706"/>
  <text x="210" y="23" text-anchor="middle" fill="#92400e" font-size="11">"macbok pro 13in"</text>

  <!-- Three arrows down to processes -->
  <line x1="130" y1="32" x2="80" y2="52" stroke="#475569" stroke-width="1" marker-end="url(#ex)"/>
  <line x1="210" y1="32" x2="210" y2="52" stroke="#475569" stroke-width="1" marker-end="url(#ex)"/>
  <line x1="290" y1="32" x2="340" y2="52" stroke="#475569" stroke-width="1" marker-end="url(#ex)"/>

  <!-- Process 1: Spell correction -->
  <rect x="10" y="56" width="140" height="44" rx="5" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="80" y="72" text-anchor="middle" fill="#0c4a6e" font-size="9" font-weight="bold">Spell correction</text>
  <text x="80" y="88" text-anchor="middle" fill="#0c4a6e" font-size="9">"macbok" → "macbook"</text>

  <!-- Process 2: Exact match -->
  <rect x="160" y="56" width="100" height="44" rx="5" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="210" y="72" text-anchor="middle" fill="#0c4a6e" font-size="9" font-weight="bold">Exact match</text>
  <text x="210" y="88" text-anchor="middle" fill="#0c4a6e" font-size="9">"pro" → pass</text>

  <!-- Process 3: Unit detection + expansion -->
  <rect x="270" y="56" width="140" height="44" rx="5" fill="#e0f2fe" stroke="#0ea5e9"/>
  <text x="340" y="72" text-anchor="middle" fill="#0c4a6e" font-size="9" font-weight="bold">Unit detection</text>
  <text x="340" y="88" text-anchor="middle" fill="#0c4a6e" font-size="9">"13in" → +33cm, +330mm</text>

  <!-- Three arrows down to result -->
  <line x1="80" y1="100" x2="130" y2="120" stroke="#475569" stroke-width="1" marker-end="url(#ex)"/>
  <line x1="210" y1="100" x2="210" y2="120" stroke="#475569" stroke-width="1" marker-end="url(#ex)"/>
  <line x1="340" y1="100" x2="290" y2="120" stroke="#475569" stroke-width="1" marker-end="url(#ex)"/>

  <!-- Output KeySet -->
  <rect x="40" y="124" width="340" height="68" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="210" y="140" text-anchor="middle" fill="#166534" font-size="9" font-weight="bold">KeySet → Inverted Index</text>
  <text x="210" y="156" text-anchor="middle" fill="#166534" font-size="10">AND [</text>
  <text x="210" y="170" text-anchor="middle" fill="#166534" font-size="10">OR ["macbook", "macbok"],  OR ["pro"],</text>
  <text x="210" y="184" text-anchor="middle" fill="#166534" font-size="10">OR ["13in", "13 in", "33cm", "330mm"]  ]</text>
</svg>
