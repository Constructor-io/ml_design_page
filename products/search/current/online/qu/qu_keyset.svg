<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 160" font-family="monospace" font-size="10">
  <defs>
    <marker id="a" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,1 L5,3 L0,5" fill="none" stroke="#475569" stroke-width="0.8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="280" y="14" text-anchor="middle" fill="#64748b" font-size="9">QUERY GRAPH → KEYSET (example: "macbok pro 13in")</text>

  <!-- Position 1: OR group -->
  <rect x="60" y="30" width="120" height="60" rx="6" fill="#f0f9ff" stroke="#0ea5e9" stroke-dasharray="3"/>
  <text x="120" y="44" text-anchor="middle" fill="#0ea5e9" font-size="8" font-weight="bold">OR (position 1)</text>
  <text x="120" y="60" text-anchor="middle" fill="#0c4a6e" font-size="10">"macbook"</text>
  <text x="120" y="76" text-anchor="middle" fill="#64748b" font-size="10">"macbok"</text>

  <!-- Position 2: OR group -->
  <rect x="220" y="30" width="100" height="60" rx="6" fill="#f0f9ff" stroke="#0ea5e9" stroke-dasharray="3"/>
  <text x="270" y="44" text-anchor="middle" fill="#0ea5e9" font-size="8" font-weight="bold">OR (position 2)</text>
  <text x="270" y="64" text-anchor="middle" fill="#0c4a6e" font-size="10">"pro"</text>

  <!-- Position 3: OR group -->
  <rect x="360" y="24" width="140" height="72" rx="6" fill="#f0f9ff" stroke="#0ea5e9" stroke-dasharray="3"/>
  <text x="430" y="38" text-anchor="middle" fill="#0ea5e9" font-size="8" font-weight="bold">OR (position 3)</text>
  <text x="430" y="54" text-anchor="middle" fill="#0c4a6e" font-size="10">"13in"</text>
  <text x="430" y="68" text-anchor="middle" fill="#64748b" font-size="10">"13 in"</text>
  <text x="430" y="82" text-anchor="middle" fill="#64748b" font-size="10">"33cm" "330mm"</text>

  <!-- AND arrows between groups -->
  <line x1="180" y1="60" x2="220" y2="60" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="200" y="54" text-anchor="middle" fill="#475569" font-size="8" font-weight="bold">AND</text>

  <line x1="320" y1="60" x2="360" y2="60" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>
  <text x="340" y="54" text-anchor="middle" fill="#475569" font-size="8" font-weight="bold">AND</text>

  <!-- Result representation -->
  <rect x="40" y="115" width="480" height="32" rx="5" fill="#dcfce7" stroke="#16a34a"/>
  <text x="280" y="135" text-anchor="middle" fill="#166534" font-size="10">KeySet = AND [ OR["macbook","macbok"],  OR["pro"],  OR["13in","13 in","33cm","330mm"] ]</text>

  <!-- Arrow down -->
  <line x1="280" y1="96" x2="280" y2="115" stroke="#475569" stroke-width="1.2" marker-end="url(#a)"/>
</svg>
