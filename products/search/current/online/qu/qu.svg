<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 540" font-family="monospace" font-size="11">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <path d="M0,1 L6,3.5 L0,6" fill="none" stroke="#475569" stroke-width="1"/>
    </marker>
  </defs>

  <text x="310" y="16" text-anchor="middle" fill="#64748b" font-size="9">QUERY SERVICE — END-TO-END FLOW</text>

  <!-- Input -->
  <rect x="220" y="28" width="180" height="28" rx="4" fill="#fef3c7" stroke="#d97706"/>
  <text x="310" y="46" text-anchor="middle" fill="#92400e" font-size="10">raw query: "macbok pro 13in"</text>

  <line x1="310" y1="56" x2="310" y2="74" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- RPC1: GetSpellingCorrections -->
  <rect x="30" y="78" width="560" height="310" rx="8" fill="#f8fafc" stroke="#64748b" stroke-dasharray="4"/>
  <text x="50" y="96" fill="#475569" font-size="9" font-weight="bold">RPC 1: GetSpellingCorrections</text>

  <!-- Tokenize -->
  <g data-click="qu_tokenize" style="cursor:pointer">
    <rect x="160" y="106" width="300" height="30" rx="5" fill="#e0f2fe" stroke="#0ea5e9"/>
    <text x="310" y="125" text-anchor="middle" fill="#0c4a6e" font-size="10">Tokenize + Classify</text>
  </g>

  <line x1="310" y1="136" x2="310" y2="152" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Token classification results -->
  <rect x="80" y="156" width="130" height="24" rx="4" fill="#dcfce7" stroke="#16a34a"/>
  <text x="145" y="172" text-anchor="middle" fill="#166534" font-size="9">exact/entity → pass</text>

  <rect x="245" y="156" width="130" height="24" rx="4" fill="#fee2e2" stroke="#dc2626"/>
  <text x="310" y="172" text-anchor="middle" fill="#991b1b" font-size="9">unknown → fuzzy</text>

  <rect x="410" y="156" width="130" height="24" rx="4" fill="#f3e8ff" stroke="#7c3aed"/>
  <text x="475" y="172" text-anchor="middle" fill="#5b21b6" font-size="9">last token → complete</text>

  <line x1="310" y1="180" x2="310" y2="198" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- DAWG fuzzy -->
  <g data-click="qu_fuzzy" style="cursor:pointer">
    <rect x="160" y="202" width="300" height="30" rx="5" fill="#e0f2fe" stroke="#0ea5e9"/>
    <text x="310" y="221" text-anchor="middle" fill="#0c4a6e" font-size="10">DAWG Fuzzy Lookup (per token)</text>
  </g>

  <line x1="310" y1="232" x2="310" y2="248" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Beam search -->
  <g data-click="qu_beam" style="cursor:pointer">
    <rect x="160" y="252" width="300" height="30" rx="5" fill="#e0f2fe" stroke="#0ea5e9"/>
    <text x="310" y="271" text-anchor="middle" fill="#0c4a6e" font-size="10">Beam Search (width=10)</text>
  </g>

  <!-- KenLM and DAWG scoring -->
  <rect x="490" y="240" width="90" height="22" rx="4" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="535" y="255" text-anchor="middle" fill="#854d0e" font-size="9">KenLM (3g)</text>
  <line x1="490" y1="258" x2="460" y2="265" stroke="#ca8a04" stroke-width="1" marker-end="url(#arr)"/>

  <rect x="490" y="266" width="90" height="22" rx="4" fill="#fef9c3" stroke="#ca8a04"/>
  <text x="535" y="281" text-anchor="middle" fill="#854d0e" font-size="9">DAWG scores</text>
  <line x1="490" y1="272" x2="460" y2="270" stroke="#ca8a04" stroke-width="1" marker-end="url(#arr)"/>

  <line x1="310" y1="282" x2="310" y2="298" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Finalizer -->
  <g data-click="qu_finalizer" style="cursor:pointer">
    <rect x="160" y="302" width="300" height="30" rx="5" fill="#e0f2fe" stroke="#0ea5e9"/>
    <text x="310" y="321" text-anchor="middle" fill="#0c4a6e" font-size="10">Finalizer (overrides, skip tokens)</text>
  </g>

  <line x1="310" y1="332" x2="310" y2="348" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- CatBoost filter -->
  <g data-click="qu_filter" style="cursor:pointer">
    <rect x="160" y="352" width="300" height="30" rx="5" fill="#fef3c7" stroke="#d97706"/>
    <text x="310" y="371" text-anchor="middle" fill="#92400e" font-size="10">CatBoost Filter (P >= 0.3)</text>
  </g>

  <line x1="310" y1="388" x2="310" y2="405" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- RPC2: GetKeysetsAndBoosts -->
  <g data-click="qu_expansion" style="cursor:pointer">
    <rect x="30" y="410" width="560" height="80" rx="8" fill="#f8fafc" stroke="#64748b" stroke-dasharray="4"/>
    <text x="50" y="428" fill="#475569" font-size="9" font-weight="bold">RPC 2: GetKeysetsAndBoosts</text>

    <!-- Expansion steps -->
    <rect x="50" y="438" width="100" height="24" rx="4" fill="#e0f2fe" stroke="#0ea5e9"/>
    <text x="100" y="454" text-anchor="middle" fill="#0c4a6e" font-size="9">+ Stems</text>

    <rect x="165" y="438" width="100" height="24" rx="4" fill="#e0f2fe" stroke="#0ea5e9"/>
    <text x="215" y="454" text-anchor="middle" fill="#0c4a6e" font-size="9">+ Synonyms</text>

    <rect x="280" y="438" width="120" height="24" rx="4" fill="#e0f2fe" stroke="#0ea5e9"/>
    <text x="340" y="454" text-anchor="middle" fill="#0c4a6e" font-size="9">+ Unit conversions</text>

    <rect x="415" y="438" width="120" height="24" rx="4" fill="#e0f2fe" stroke="#0ea5e9"/>
    <text x="475" y="454" text-anchor="middle" fill="#0c4a6e" font-size="9">Stopword drop</text>
  </g>

  <!-- Arrow to output -->
  <line x1="310" y1="490" x2="310" y2="496" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="90" y="500" width="440" height="28" rx="4" fill="#dcfce7" stroke="#16a34a"/>
  <text x="310" y="518" text-anchor="middle" fill="#166534" font-size="10">KeySet: AND[ OR["macbook","macbok"], OR["pro"], OR["13in","33cm"] ]</text>
</svg>
