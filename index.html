ata-click=\"keysets\" style=\"cursor:pointer\">\n    <rect x=\"10\" y=\"252\" width=\"360\" height=\"60\" rx=\"8\" fill=\"#f8fafc\" stroke=\"#64748b\"/>\n    <text x=\"190\" y=\"277\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"11\" font-weight=\"bold\">GetKeysetsAndBoosts</text>\n    <text x=\"190\" y=\"297\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"9\">corrections → synonym expansion → KeySet tree + boost weights</text>\n  </g>\n\n  <line x1=\"190\" y1=\"312\" x2=\"190\" y2=\"332\" stroke=\"#475569\" stroke-width=\"1.5\" marker-end=\"url(#a)\"/>\n\n  <!-- Parallel retrieval -->\n  <g data-click=\"query_flow\" style=\"cursor:pointer\">\n    <rect x=\"10\" y=\"335\" width=\"360\" height=\"155\" rx=\"8\" fill=\"#f8fafc\" stroke=\"#64748b\"/>\n    <text x=\"190\" y=\"355\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"12\" font-weight=\"bold\">Parallel Retrieval (per section)</text>\n  </g>\n\n  <g data-click=\"query_flow\" style=\"cursor:pointer\">\n    <rect x=\"25\" y=\"365\" width=\"155\" height=\"28\" rx=\"5\" fill=\"#e7f5ff\" stroke=\"#339af0\"/>\n    <text x=\"102\" y=\"383\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"10\">Inverted Index (SABR)</text>\n  </g>\n  <g data-click=\"ces_ac\" style=\"cursor:pointer\">\n    <rect x=\"195\" y=\"365\" width=\"155\" height=\"28\" rx=\"5\" fill=\"#f3f0ff\" stroke=\"#7c3aed\"/>\n    <text x=\"272\" y=\"383\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"10\">CES (semantic)</text>\n  </g>\n  <g data-click=\"ss_personalization\" style=\"cursor:pointer\">\n    <rect x=\"25\" y=\"400\" width=\"155\" height=\"28\" rx=\"5\" fill=\"#fff9db\" stroke=\"#f59f00\"/>\n    <text x=\"102\" y=\"418\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"10\">Personalization boost</text>\n  </g>\n  <g data-click=\"query_flow\" style=\"cursor:pointer\">\n    <rect x=\"195\" y=\"400\" width=\"155\" height=\"28\" rx=\"5\" fill=\"#e6fcf5\" stroke=\"#2b8a3e\"/>\n    <text x=\"272\" y=\"418\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"10\">Query-items (CTR)</text>\n  </g>\n  <g data-click=\"query_flow\" style=\"cursor:pointer\">\n    <rect x=\"25\" y=\"435\" width=\"155\" height=\"28\" rx=\"5\" fill=\"#f8fafc\" stroke=\"#94a3b8\"/>\n    <text x=\"102\" y=\"453\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"10\">Searchandizing rules</text>\n  </g>\n  <g data-click=\"query_flow\" style=\"cursor:pointer\">\n    <rect x=\"195\" y=\"435\" width=\"155\" height=\"28\" rx=\"5\" fill=\"#fff5f5\" stroke=\"#e03131\"/>\n    <text x=\"272\" y=\"453\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"10\">Reranker (optional)</text>\n  </g>\n\n  <text x=\"190\" y=\"480\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"9\">second-pass if first-pass insufficient</text>\n\n  <line x1=\"190\" y1=\"490\" x2=\"190\" y2=\"510\" stroke=\"#475569\" stroke-width=\"1.5\" marker-end=\"url(#a)\"/>\n\n  <!-- Multi-section merge -->\n  <g data-click=\"query_flow\" style=\"cursor:pointer\">\n    <rect x=\"60\" y=\"513\" width=\"260\" height=\"50\" rx=\"6\" fill=\"#f8fafc\" stroke=\"#64748b\"/>\n    <text x=\"190\" y=\"535\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"11\" font-weight=\"bold\">Multi-section Merge</text>\n    <text x=\"190\" y=\"552\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"9\">round-robin allocation across sections</text>\n  </g>\n\n  <line x1=\"190\" y1=\"563\" x2=\"190\" y2=\"583\" stroke=\"#475569\" stroke-width=\"1.5\" marker-end=\"url(#a)\"/>\n\n  <!-- Response -->\n  <rect x=\"60\" y=\"586\" width=\"260\" height=\"50\" rx=\"6\" fill=\"#e0f2fe\" stroke=\"#0ea5e9\"/>\n  <text x=\"190\" y=\"607\" text-anchor=\"middle\" fill=\"#0c4a6e\" font-size=\"11\" font-weight=\"bold\">Response</text>\n  <text x=\"190\" y=\"624\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"9\">metadata enrichment + sponsored slotting</text>\n</svg>"}], "block_count": 11, "diagram_count": 2}, "autocomplete": {"blocks_by_view": {"current_online": {"overview": {"html": "<h2>Autocomplete</h2>\n\n<p>Real-time suggestions as the user types — combining prefix matching, popularity signals, personalization, and result preview. Must respond in <50ms per keystroke.</p>\n\n<h3>Key Components</h3>\n\n<table><tr><th>Component</th><th>Description</th><th>Status</th></tr><tr><td>Prefix matching</td><td>Trie/DAWG-based prefix lookup</td><td>TODO</td></tr><tr><td>Candidate ranking</td><td>ML model scoring suggestion candidates</td><td>TODO</td></tr><tr><td>Personalization</td><td>User-specific suggestion boosting</td><td>TODO</td></tr><tr><td>Result types</td><td>Items, queries, categories, brands in suggestions</td><td>TODO</td></tr><tr><td>Latency budget</td><td><50ms total including network</td><td>TODO</td></tr></table>\n\n<h3>Differences from Search Suggestions</h3>\n\n<ul><li>Triggered on every keystroke (not on submit)</li><li>Much stricter latency requirements</li><li>Shows mixed result types (items + suggestions + categories)</li><li>Prefix-based matching (not full query understanding)</li></ul>", "variants": [], "source": "products/autocomplete/current/online/overview/overview.md", "title": "Autocomplete Overview", "position": 1}}}, "diagrams": [{"id": "current_online", "label": "Current Online", "group": "current", "sublabel": "Online", "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 380 300\" font-family=\"monospace\" font-size=\"12\">\n  <rect x=\"0\" y=\"0\" width=\"380\" height=\"300\" fill=\"#f8fafc\"/>\n  <text x=\"190\" y=\"20\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"10\">AUTOCOMPLETE — CURRENT STATE</text>\n\n  <g data-click=\"overview\" style=\"cursor:pointer\">\n    <rect x=\"40\" y=\"50\" width=\"300\" height=\"50\" rx=\"8\" fill=\"#fef3c7\" stroke=\"#f59e0b\" stroke-dasharray=\"4\"/>\n    <text x=\"190\" y=\"80\" text-anchor=\"middle\" fill=\"#92400e\" font-size=\"11\">Prefix Matching (Trie / DAWG)</text>\n  </g>\n\n  <g data-click=\"overview\" style=\"cursor:pointer\">\n    <rect x=\"40\" y=\"120\" width=\"300\" height=\"50\" rx=\"8\" fill=\"#e0f2fe\" stroke=\"#0ea5e9\" stroke-dasharray=\"4\"/>\n    <text x=\"190\" y=\"150\" text-anchor=\"middle\" fill=\"#0c4a6e\" font-size=\"11\">Candidate Ranking</text>\n  </g>\n\n  <g data-click=\"overview\" style=\"cursor:pointer\">\n    <rect x=\"40\" y=\"190\" width=\"300\" height=\"50\" rx=\"8\" fill=\"#f0fdf4\" stroke=\"#22c55e\" stroke-dasharray=\"4\"/>\n    <text x=\"190\" y=\"220\" text-anchor=\"middle\" fill=\"#166534\" font-size=\"11\">Result Types (items, suggestions, categories)</text>\n  </g>\n\n  <text x=\"190\" y=\"275\" text-anchor=\"middle\" fill=\"#cbd5e1\" font-size=\"10\" font-style=\"italic\">TODO: detailed architecture diagram</text>\n</svg>"}], "block_count": 1, "diagram_count": 1}, "recommendations": {"blocks_by_view": {"current_offline": {"dual_encoder": {"html": "<h2>Complementary Dual-Encoder (LLM-trained)</h2>\n\n<pre><code>\nHidden dim:     256\n\n\nInput:          CES vectors (pretrained item embeddings as initialization)\n\n\nTraining signal: GPT-labeled complementary pairs (binary: complementary/non-complementary)\n\n\nOptional weight: actual post-click purchases from the pod (revenue signal)\n\n\nEpochs:         500\n\n\nBatch size:     2048\n\n\nLR:             0.0001 → 0.001 (cosine annealing)\n\n\n</code></pre>\n\n<p>Output: item embeddings in JSONL, consumed by <code>EmbeddingSimilarityCandidates(embedding_type='complementary_llm')</code>.</p>", "variants": [], "source": "products/recommendations/current/offline/candidates/dual_encoder.md", "title": "Complementary Dual-Encoder", "position": 5}, "embeddings": {"html": "<h2>EmbeddingSimilarityCandidates (Granne ANN)</h2>\n\n<p>General framework for all embedding-based sources. Per-item ANN search (Granne, HNSW), parallel across all catalog items (joblib, all CPUs).</p>\n\n<h3>Embedding types</h3>\n\n<table><tr><th>Embedding type</th><th>Model</th><th>Dim</th><th>Training signal</th><th>Dual vectors</th></tr><tr><td><code>lightfm</code></td><td>LightFM (personalization)</td><td>16</td><td>clicks (WARP)</td><td>No</td></tr><tr><td><code>ces</code></td><td>FastText (catalog text)</td><td>64</td><td>unsupervised skip-gram</td><td>No</td></tr><tr><td><code>ces_dssm</code></td><td>DSSM (behavioral fine-tune)</td><td>64</td><td>triplet loss on clicks</td><td>No</td></tr><tr><td><code>ces_best</code></td><td>Best available CES model</td><td>varies</td><td>varies</td><td>No</td></tr><tr><td><code>w2v</code></td><td>Word2Vec CBOW</td><td>100</td><td>purchase baskets</td><td>No</td></tr><tr><td><code>w2v_skip_gram</code></td><td>Word2Vec Skip-gram</td><td>32–128</td><td>purchase baskets</td><td>Yes (<code>wv</code> + <code>syn1neg</code>)</td></tr><tr><td><code>vit</code></td><td>EfficientNet-B0 / ViT-DINO / SigLIP</td><td>varies</td><td>pretrained (no fine-tune)</td><td>No</td></tr><tr><td><code>complementary_llm</code></td><td>Dual-encoder NN (256d hidden)</td><td>varies</td><td>GPT-labeled complementary pairs</td><td>Yes</td></tr><tr><td><code>complementary_lfm</code></td><td>LightFM item-to-item</td><td>64</td><td>co-purchases (WARP)</td><td>Yes (<code>user_repr</code> + <code>item_repr</code>)</td></tr><tr><td><code>complementary_lfm_pmi</code></td><td>LightFM + PMI weighting</td><td>64</td><td>co-purchases + hierarchical PMI</td><td>Yes</td></tr><tr><td><code>static_complementary</code></td><td>Pre-computed (hardcoded S3)</td><td>—</td><td>LLM-generated</td><td>Yes</td></tr></table>\n\n<h3>Granne index params</h3>\n\n<pre><code>\nIndex type: ANGULAR (float32, for recs) or ANGULAR_INT (quantized, for CES service)\n\n\nmax_search: 500 (build + query time beam width)\n\n\nProcess isolation: subprocess (avoid Python GIL deadlocks)\n\n\n</code></pre>\n\n<h3>Cluster auto-scaling by catalog size</h3>\n\n<p>200K items → 2x driver, 1M → 4x, 10M → 8x.</p>", "variants": [], "source": "products/recommendations/current/offline/candidates/embeddings.md", "title": "Embedding Candidates (Granne ANN)", "position": 1}, "graph_methods": {"html": "<h2>Graph-Based Candidate Methods</h2>\n\n<h3>ComplementaryItemsGraphTable (ALS)</h3>\n\n<p>Co-occurrence → ALS matrix factorization.</p>\n\n<pre><code>\nSource:          ComputeCoOccurredItems (co-conversion or co-purchase pairs)\n\n\nFilter:          binomial CI lower bound on conditional probability &gt;= min_conditional_prob\n\n\nALS:             implicit.als.AlternatingLeastSquares\n\n\n  factors:       40\n\n\n  iterations:    100\n\n\nPeriod:          30d (default), 50d, 120d variants\n\n\nMax candidates:  20\n\n\nMin pair counts: 2\n\n\nScore formula:   relevance_weight * co_occurrence_relevance + (1 - relevance_weight) * ALS_score\n\n\n  relevance_weight: 0.9 (default — heavily favors co-occurrence count)\n\n\nFinal:           log-normalized × weight_multiplier\n\n\n</code></pre>\n\n<h3>GenerateFrequentItemsetsBundles (FP-Growth)</h3>\n\n<pre><code>\nSource:          purchase events (fallback: ATC)\n\n\nBaskets:         sessions of unique items\n\n\nMin basket size: 2\n\n\nMax basket size: 8\n\n\nSupport:         SupportThresholdStrategy.MEDIAN\n\n\nPeriod:          60d\n\n\nAlgorithm:       FP-Growth (FreqItemsetsBundles)\n\n\nOutput:          item→item pairs from frequent co-purchase patterns\n\n\n</code></pre>\n\n<h3>ComputeCoClickedItems</h3>\n\n<pre><code>\nSource:          CLICK_THROUGH + BROWSE_RESULT_CLICK within same session\n\n\nScore:           normalized co-click count / total clicks for item_1\n\n\nExperience:      ALTERNATIVE\n\n\n</code></pre>", "variants": [], "source": "products/recommendations/current/offline/candidates/graph_methods.md", "title": "Graph-Based Methods (ALS, FP-Growth, Co-clicks)", "position": 6}, "lightfm": {"html": "<h2>LightFM Models</h2>\n\n<h3>LightFM (Personalization — Alternative Items)</h3>\n\n<p>User-item collaborative filtering. Items and users in one embedding space.</p>\n\n<pre><code>\nEmbedding dim:      16\n\n\nLoss:               WARP (Weighted Approximate-Rank Pairwise)\n\n\nMax negatives:      1000 per step\n\n\nEpochs:             60\n\n\nTrain/val split:    80/20\n\n\nInteraction signal: click_through (weight=1.0), optional: conversion, purchase\n\n\nMin interactions:   3 per user\n\n\nMax interactions:   99th percentile cap\n\n\nItem features:      FastText text embeddings + group IDs (categories)\n\n\nUser features:      identity only\n\n\n</code></pre>\n\n<p>Embedding extraction: <code>model.get_item_representations(features)</code> → <code>vec</code> per item.</p>\n\n<h3>LightFM (Complementary — Item-to-Item)</h3>\n\n<p>Item-to-item MF: items act as both \"users\" and \"items\". Model predicts co-purchase pairs.</p>\n\n<pre><code>\nEmbedding dim:      64\n\n\nLoss:               WARP\n\n\nMax negatives:      1000\n\n\nEpochs:             100\n\n\nTrain period:       120 days\n\n\nInteraction data:   item co-occurrence pairs from purchases/ATC\n\n\nItem features:      Catalog metadata (brand, category, etc.) via RexSearchableFeatures\n\n\n                    Vocabulary pruned to coverage_threshold=0.9\n\n\nIdentity features:  disabled (item_identity_features=False, user_identity_features=False)\n\n\n</code></pre>\n\n<p>Sample weights: <code>log1p(count)</code> (base variant).</p>\n\n<h3>PMI variant</h3>\n\n<pre><code>\nPMI temperature:    2.5\n\n\nPMI clip:           [0.1, 10.0]\n\n\nZ-score threshold:  1.96 (95% CI significance filter)\n\n\nWeight method:      'hybrid' = log1p(count) * clip(exp(pmi/T), 0.1, 10.0)\n\n\nTaxonomy fields:    hierarchical category (deepest significant level via coalesce)\n\n\n</code></pre>\n\n<p>Dual embeddings: <code>query_vec</code> = <code>get_user_representations()</code>, <code>index_vec</code> = <code>get_item_representations()</code>.</p>", "variants": [], "source": "products/recommendations/current/offline/candidates/lightfm.md", "title": "LightFM Models", "position": 2}, "vit": {"html": "<h2>ViT / Image Similarity</h2>\n\n<pre><code>\nModel:          EfficientNet-B0 (default, pretrained ImageNet, S3 artifact)\n\n\n                ViT-B/16 DINO (alternative)\n\n\n                Marqo/marqo-fashionSigLIP (fashion OpenCLIP)\n\n\nInput:          256x256 (EfficientNet), 224x224 (ViT/SigLIP)\n\n\nNorm:           ImageNet mean/std\n\n\nEmbedding:      num_classes=0 (classifier head removed), feature layer output\n\n\nBatch size:     256\n\n\nWorkers:        4\n\n\nHardware:       g5.2xlarge (scales to g5.8xlarge for catalogs &gt;600K items)\n\n\nPrecision:      bfloat16 (CUDA AMP), channels-last memory format\n\n\n</code></pre>\n\n<p>No fine-tuning — pretrained features only.</p>", "variants": [], "source": "products/recommendations/current/offline/candidates/vit.md", "title": "Image Similarity (ViT)", "position": 4}, "w2v": {"html": "<h2>Word2Vec</h2>\n\n<h3>CBOW variant (<code>w2v</code>)</h3>\n\n<pre><code>\nDim:        100\n\n\nWindow:     9 (full basket context)\n\n\nMin count:  1\n\n\nEpochs:     5\n\n\nWorkers:    16\n\n\nSignal:     purchase baskets (fallback: ATC)\n\n\nBasket:     max 10 items per basket\n\n\n</code></pre>\n\n<h3>Skip-gram variant (<code>w2v_skip_gram</code>)</h3>\n\n<pre><code>\nsg:         1 (skip-gram)\n\n\nEpochs:     100\n\n\nNegative:   20\n\n\nGrid search: dim in [32, 64, 128], negative in [5, 10], epochs in [10, 20, 30]\n\n\n</code></pre>\n\n<p>Dual vectors: <code>wv</code> (output layer) = query vectors, <code>syn1neg</code> (negative sampling hidden) = index vectors. Asymmetric query/index space.</p>", "variants": [], "source": "products/recommendations/current/offline/candidates/w2v.md", "title": "Word2Vec", "position": 3}, "indexing": {"html": "<h2>Index Building & Storage</h2>\n\n<h3>RecommendationsToIndexBase</h3>\n\n<p>Per-strategy index builder. Output format (JSONL, one line per seed item):</p>\n<pre><code>\n{\"customer_id\": \"product-abc\", \"similar_customer_ids\": {\"product-xyz\": 0.50000000, \"product-def\": 0.33333333}}\n\n\n</code></pre>\n\n<p><strong>Score scaling</strong> (default, <code>use_scores=False</code>):</p>\n<pre><code>\nscore = 1 / (1 + rank)     // rank 0-based\n\n\nrank 0 → 1.0, rank 1 → 0.5, rank 2 → 0.333, rank 9 → 0.1\n\n\n</code></pre>\n\n<p>With <code>use_scores=True</code> — raw model score, rounded to 8 decimal places.</p>\n\n<p>S3 path: <code>s3://.../similar-items/output/{TASK_DIRECTORY}/tag={tag}/version={version}/{date}/ac_id_{ac_id}.jsonl</code></p>\n\n<h3>MergeSimilarItemsGraphsV2</h3>\n\n<p>Combines all strategy indices into one graph per customer.</p>\n\n<p><strong>Default mappings:</strong></p>\n<pre><code>\n{'neighbor_items', 'neighbor_items_reranked', 'complementary_items',\n\n\n 'complementary_items_backfilled', 'frequent_itemsets_items'}\n\n\n</code></pre>\n\n<p>Per-customer: <code>mappings_to_add</code> / <code>mappings_to_remove</code> (remove has priority).</p>\n\n<p><strong>Merge logic (Spark combineByKey):</strong> no cross-source normalization. Scores from each source stored as-is, keyed under mapping type name. Output per item:</p>\n<pre><code>\n{\n\n\n  \"customer_id\": \"product-abc\",\n\n\n  \"similar_customer_ids\": {\n\n\n    \"neighbor_items\": {\"product-xyz\": 0.5, \"product-def\": 0.12},\n\n\n    \"complementary_items\": {\"product-ghi\": 0.8},\n\n\n    \"neighbor_items_reranked\": {\"product-xyz\": 0.9}\n\n\n  }\n\n\n}\n\n\n</code></pre>\n\n<h3>DynamoDB Upload</h3>\n\n<pre><code>\nTable (prod):       dp-global-item-to-items-graph-prod\n\n\nPartition key (pk): \"data/part:ac_id={ac_id}/ver:{YYYY-MM-DD-NN}/bpk:{customer_id}\"\n\n\nSort key (sk):      \"bsk:\" (empty business SK)\n\n\nMetadata key:       pk=\"meta/versions\", sk=\"part:ac_id={ac_id}\"\n\n\nScore type:         DecimalType(precision=28, scale=16)\n\n\nBatch write:        25 items per boto3 batch (DynamoDB limit)\n\n\nParallelism:        16 threads per Spark partition, 5000 rows per partition\n\n\nTTL:                none (explicit version cleanup via delete_partition_versions)\n\n\n</code></pre>\n\n<h3>Top Items Stats (Bestsellers)</h3>\n\n<p>Source: <code>StgProductStatsDailyTask</code> (item-action-counts).</p>\n\n<p><strong>Metrics per period [31d, 14d, 7d, 2d, 1d]:</strong></p>\n<ul><li><code>click_through_cnt_{N}d</code></li><li><code>conversion_cnt_{N}d</code></li><li><code>purchase_cnt_{N}d</code></li></ul>\n\n<p><strong>Derived metrics:</strong></p>\n<pre><code>\npurchase_cnt_{N}d_w_fallbacks =\n\n\n    computed_score / 1e6 + click_cnt / 1e4 + conversion_cnt / 1e2 + purchase_cnt\n\n\n\n\n\nconversion_cnt_{N}d_w_fallbacks =\n\n\n    computed_score / 1e4 + click_cnt / 1e2 + conversion_cnt\n\n\n</code></pre>\n\n<p><strong>Segment-based:</strong> <code>{metric}<SEP>us={segment_name}</code> (e.g., <code>purchase_cnt_7d<SEP>us=brand | dior</code>)</p>\n\n<p><strong>Facet-refined:</strong> <code>{metric}<SEP>{facet_name}={value}</code> (e.g., <code>complementary_items<SEP>Color=Red</code>)</p>\n\n<p><strong>Top N items:</strong> 200 per metric (max 500). Scores normalized to [0,1] by dividing by max.</p>\n\n<h3>Query Recommendations (Zero-Result Fallback)</h3>\n\n<pre><code>\nStep 1: FindQueryReformulations — what users reformulate zero-result queries into\n\n\nStep 2: ExplodeQueryResultsSnapshot — what items appear for reformulated queries\n\n\nStep 3: GenerateZeroResultRecommendations:\n\n\n          score = sum(reformulations) / (1 + sum(position * reformulations))\n\n\n          Top 30 items per zero-result query\n\n\nStep 4: ZeroResultRecommendationsS3Index → JSONL (top_size=500)\n\n\nStep 5: MergeQueryRecommendationsGraphsV2 → KV Service\n\n\n</code></pre>\n\n<p>Serving: <code>QueryItemsRecommender</code> — query normalized (lowercase, whitespace-collapsed) → KV lookup → sorted by descending score.</p>", "variants": [], "source": "products/recommendations/current/offline/pipeline/indexing.md", "title": "Index Building & Storage", "position": 10}, "llm_labeling": {"html": "<h2>LLM Labeling Pipeline</h2>\n\n<pre><code>\nTask:           LLMOnlineLabels\n\n\nModel:          OpenAI GPT (async)\n\n\nLabels:         3-class (alternative / complementary / irrelevant)\n\n\n                or binary (complementary / non-complementary)\n\n\nMax batch:      50K pairs per run\n\n\nMax total:      10M pairs\n\n\nSources:        reranker_positives_dataset, llm_just_added_candidates_dataset, others\n\n\nOutput:         Delta table rex_llm_labels, partitioned by (day, ac_key, model_tag)\n\n\nUsage:          LLMFiltered variants (filter or boost) applied to any base index\n\n\n</code></pre>\n\n<p>Each <code><em>_filtered</code> / <code></em>_boosted</code> variant: base index + <code>LLMFiltered</code> post-processing.</p>", "variants": [], "source": "products/recommendations/current/offline/pipeline/llm_labeling.md", "title": "LLM Labeling Pipeline", "position": 9}, "reranker": {"html": "<h2>Offline Reranker</h2>\n\n<h3>Model</h3>\n\n<pre><code>\nBackend:        LightGBM (LGBM) LambdaRank\n\n\nn_estimators:   500\n\n\nmax_depth:      7\n\n\nnum_leaves:     22\n\n\nsubsample:      0.8\n\n\nlearning_rate:  0.15355\n\n\nreg_alpha:      50\n\n\nreg_lambda:     5\n\n\nlabel_gain:     0,1,1023,4095  (strongly upweights purchases: gain[3]=4095 vs gain[1]=1)\n\n\n</code></pre>\n\n<p>Model types: <code>simple</code> (GBDT), <code>rpv</code> (+ revenue-per-visit calibration), <code>combined</code>.</p>\n\n<p><strong>Quality guards (fallback to IdentityReranker):</strong></p>\n<ul><li>Positives in train < 500</li><li>Validation size < 100</li><li>Unique labels < 2</li></ul>\n\n<h3>Dataset Construction</h3>\n\n<p><strong>Alternative items:</strong></p>\n\n<table><tr><th>Parameter</th><th>Value</th></tr><tr><td>Query anchor</td><td>click_through, browse_result_click</td></tr><tr><td>Target</td><td>click_through, browse_result_click (same session, ≤15s)</td></tr><tr><td>Scope</td><td>session_id</td></tr><tr><td>Period</td><td>inherited from task params</td></tr></table>\n\n<p><strong>Complementary items:</strong></p>\n\n<table><tr><th>Parameter</th><th>Value</th></tr><tr><td>Query anchor</td><td>conversion with subsequent purchase (≤24h)</td></tr><tr><td>Target</td><td>conversion with subsequent purchase (≤24h, different item)</td></tr><tr><td>Target window</td><td>48h (172800s)</td></tr><tr><td>Scope</td><td>user_id</td></tr></table>\n\n<p><strong>Alternative RPV variant:</strong> same as alternative, but target requires subsequent purchase (≤1d), scope = user_id.</p>\n\n<p><strong>Organic alternative items (V2):</strong> co-clicks from same search query or same browse category (group_id). Forward-looking <code>has_conversion</code> / <code>has_purchase</code> flags.</p>\n\n<p><strong>Labels:</strong></p>\n<pre><code>\n0 = negative (no action)\n\n\n1 = click (weak positive)\n\n\n2 = conversion (ATC)\n\n\n3 = purchase\n\n\n</code></pre>\n\n<p>Label assignment: <code>greatest(when(has_purchase, 3), when(has_conversion, 2), when(has_click, 1), 0)</code>.</p>\n\n<p><strong>Candidate integration:</strong> candidates from <code>CANDIDATES_SOURCES</code> joined to positives. Score transform: <code>emb_similarity_{source} = exp(-raw_score)</code>. Only groups with ≥2 distinct labels kept (<code>filter_trivial_groups</code>).</p>\n\n<h3>Features</h3>\n\n<p><strong>Feature prefix convention:</strong></p>\n<ul><li>V1: <code>q_</code> = seed item, <code>t_</code> = target/candidate item</li><li>V2: <code>seed_</code> = seed item, no prefix = target item</li></ul>\n\n<p><strong>Pairwise co-occurrence stats:</strong></p>\n<ul><li><code>pairwise_stats_30d_lag_1d__click_cnt</code> — co-click count (30d window, 1d lag)</li><li><code>pairwise_stats_30d_lag_1d__conversion_cnt</code></li><li><code>pairwise_stats_30d_lag_1d__purchase_cnt</code></li><li>Same for 120d window</li><li>Marginals: <code>..._item_1_cnt</code>, <code>..._item_2_cnt</code></li></ul>\n\n<p><strong>Derived conditional probabilities (via <code>two_features_divided</code> processor):</strong></p>\n<ul><li><code>pairwise_stats_30d_lag_1d__click_prob</code> = co_click_cnt / seed_click_cnt = P(target clicked | seed clicked)</li><li><code>pairwise_stats_30d_lag_1d__click_inv_prob</code> = co_click_cnt / target_click_cnt</li><li>Same for conversion, purchase</li></ul>\n\n<p><strong>Item-level behavioral (target only, prefixed <code>t_</code>):</strong></p>\n<ul><li><code>dsi_action_counts_7d_lag_1d_maxnrm__click_through_cnt</code></li><li><code>dsi_action_counts_7d_lag_1d_maxnrm__conversion_cnt</code></li><li><code>dsi_action_counts_7d_lag_1d_maxnrm__purchase_cnt</code></li><li>Same for 30d</li></ul>\n\n<p><strong>Candidate source scores:</strong></p>\n<ul><li><code>emb_similarity_lightfm</code></li><li><code>emb_similarity_ces_best</code></li><li><code>emb_similarity_w2v_skip_gram</code></li><li><code>emb_similarity_complementary_lfm</code></li></ul>\n\n<p><strong>Catalog attributes (per-customer):</strong></p>\n<ul><li><code>dsi_base__#@_rating</code>, <code>dsi_base__#@_brand</code>, <code>dsi_base__#@_primary_category_id</code></li><li><code>dsi_variations_base__#@_avg_price</code>, <code>dsi_variations_base__#@_on_sale_ration</code></li><li>Customer-specific: <code>dsi_base__#@_pet_type</code>, <code>dsi_base__#@_ae_body_part_lower</code>, <code>dsi_variations_base__#@_room_list</code></li></ul>\n\n<p><strong>Pairwise processors:</strong></p>\n\n<table><tr><th>Processor</th><th>Output</th><th>Formula</th></tr><tr><td><code>two_features_divided</code></td><td>conditional probs</td><td><code>l_col / r_col</code></td></tr><tr><td><code>two_features_absolute_difference</code></td><td><code>_abs_diff</code></td><td>`\\</td><td>q_feat - t_feat\\</td><td>`</td></tr><tr><td><code>two_features_relative_difference</code></td><td><code>_rel_diff</code></td><td><code>(q - t) / q</code></td></tr><tr><td><code>two_features_concat_encoded</code></td><td><code>_pair_encoded</code></td><td>concat q+t → JamesStein</td></tr><tr><td><code>two_features_list_jaccard_distance</code></td><td><code>_iou</code></td><td>Jaccard for list-valued features</td></tr><tr><td><code>apply_features_match_processor</code></td><td>binary</td><td><code>q_feat == t_feat → {0,1}</code></td></tr></table>\n\n<h3>Offline Inference</h3>\n\n<pre><code>\nTask:           ApplyOfflineREXRerankerModel\n\n\nBatch size:     2,000,000 rows per batch\n\n\nExecution:      Spark toLocalIterator (prefetchPartitions=True), driver-side scoring\n\n\nSorting:        (q_customer_id, pos) within each batch before inference\n\n\nPost-scoring:   row_number() over (item_1_id ORDER BY score DESC) → rank\n\n\nOutput:         Delta table: reranker_rex_model_inference\n\n\n                Columns: item_1_id, item_2_id, score, rank\n\n\n                Partitions: day, ac_key, tag, version\n\n\nOptional:       MetadataFilter (remove cross-category / out-of-stock candidates)\n\n\n</code></pre>\n\n<h3>Training Metrics</h3>\n\n<ul><li>Primary: <code>RerankerNDCG(k=25, reference_column='label')</code></li><li>Additional: NDCG, MAP, MRR, AUC at top_k=[5]</li><li>Revenue: <code>RerankerRevenueDiscountedByRank</code> (when revenue features present)</li><li>MLflow: <code>Constructor/Rex-offline-reranker</code></li></ul>", "variants": [], "source": "products/recommendations/current/offline/pipeline/reranker.md", "title": "Offline Reranker", "position": 8}, "scheduling": {"html": "<h2>Scheduling & Configuration</h2>\n\n<h3>Airflow DAGs</h3>\n\n<p><strong>Daily automated DAGs:</strong></p>\n<ul><li><code>DailyMergeSimilarItemsGraphsForSubscribedCustomers</code></li><li><code>DailyMergeSimilarItemsGraphsForNonSubscribedCustomers</code></li><li><code>DailyMergeSimilarItemsGraphsForExtraImportantCustomers</code></li></ul>\n\n<p><strong>On-demand:</strong> <code>RunAllLearningsInteractive</code> (ECS Luigi, retries=5, timeout=1 day).</p>\n\n<p><strong>Training schedules:</strong></p>\n<ul><li>LightFM (personalization): daily (within <code>RunAllLearnings</code>)</li><li>Word2Vec: daily</li><li>Complementary ALS: daily</li><li>FP-Growth bundles: daily</li><li>LightFM (complementary): daily</li><li>Offline reranker: daily (separate DAGs per customer group)</li></ul>\n\n<p><strong>Embedding models</strong> (via CES pipeline):</p>\n<ul><li>FastText pretrain: daily 00:16 UTC</li><li>DSSM: Tuesdays</li><li>Transformer: Wednesdays</li></ul>\n\n<h3>Customer Configuration</h3>\n\n<p><strong>V1 (42 customers, per-customer YAML):</strong></p>\n<pre><code>\n__conditional:\n\n\n  - if:\n\n\n      - model_name: rex_reranker_offline\n\n\n    then:\n\n\n      model_type: simple\n\n\n      model_training_features:\n\n\n        - emb_similarity_lightfm\n\n\n        - pairwise_stats_30d_lag_1d__click_cnt\n\n\n        - ...\n\n\n      additional_features_processor:\n\n\n        two_features_divided:\n\n\n          - l_col: pairwise_stats_30d_lag_1d__click_cnt\n\n\n            r_col: pairwise_stats_30d_lag_1d__click_item_1_cnt\n\n\n            result_col: pairwise_stats_30d_lag_1d__click_prob\n\n\n</code></pre>\n\n<p><strong>V2 (centralized defaults + per-customer overrides):</strong></p>\n<pre><code>\n# defaults/default.yaml\n\n\n__conditional:\n\n\n  - if:\n\n\n      - model_name: rex_default_complementary_reranked\n\n\n    then:\n\n\n      strategy: complementary\n\n\n  - if:\n\n\n      - model_name: rex_default_alternative_reranked\n\n\n    then:\n\n\n      strategy: alternative\n\n\n</code></pre>\n\n<p>V2 relies on centralized parameter injection, dataset registry, and automatic index registration.</p>\n\n<h3>REX Index Registry</h3>\n\n<p>Key registered indices:</p>\n\n<table><tr><th>Index name</th><th>Strategy</th><th>Pipeline</th></tr><tr><td><code>neighbor_items</code></td><td>alternative</td><td>LightFM → Granne ANN (legacy)</td></tr><tr><td><code>neighbor_items_reranked</code></td><td>alternative</td><td>LightFM candidates → offline reranker</td></tr><tr><td><code>co_clicked_items</code></td><td>alternative</td><td>co-click counts normalized</td></tr><tr><td><code>neighbor_items_backfilled</code></td><td>alternative</td><td>StackMixer (ces)</td></tr><tr><td><code>alternative_items_ces_best_reranked</code></td><td>alternative</td><td>CES candidates → offline reranker</td></tr><tr><td><code>alternative_items_pod_interactions_reranked</code></td><td>alternative</td><td>Pod interaction data → reranker</td></tr><tr><td><code>alternative_item_global_rpv</code></td><td>alternative</td><td>RPV-optimized</td></tr><tr><td><code>neighbor_items_images</code></td><td>alternative (visual)</td><td>ViT image embeddings</td></tr><tr><td><code>complementary_items</code></td><td>complementary</td><td>ALS co-conversion (30d)</td></tr><tr><td><code>complementary_items_50d</code> / <code>_120d</code></td><td>complementary</td><td>ALS (longer windows)</td></tr><tr><td><code>complementary_items_backfilled</code></td><td>complementary</td><td>StackMixer (comp+w2v+ces+lightfm)</td></tr><tr><td><code>complementary_items_llm</code></td><td>complementary</td><td>LLM dual-encoder stack</td></tr><tr><td><code>complementary_items_llm_backfilled</code></td><td>complementary</td><td>comp+w2v+llm_labeled+ces+lightfm</td></tr><tr><td><code>complementary_items_multi_source_reranked</code></td><td>complementary</td><td>Multi-source → offline reranker</td></tr><tr><td><code>frequent_itemsets_items</code></td><td>bundles</td><td>FP-Growth stacked</td></tr><tr><td><code>rex_default_alternative_reranked</code></td><td>alternative (V2)</td><td>Config-driven, organic dataset</td></tr><tr><td><code>rex_default_complementary_reranked</code></td><td>complementary (V2)</td><td>Config-driven</td></tr><tr><td><code>shop_the_look</code> / <code>complete_the_look</code></td><td>complementary</td><td>Static mapping from S3</td></tr></table>\n\n<h3>Known Limitations</h3>\n\n<ul><li><strong>Offline-only reranking</strong> — all item-to-item scores precomputed daily; no real-time model inference at serving time</li><li><strong>No cross-customer model sharing</strong> — each customer's graph trained independently (except CES pretrain)</li><li><strong>Stacking is heuristic</strong> — round-robin without learned combination weights</li><li><strong>Personalization is additive boost</strong> — not a learned re-ranking; PersonalizeREXTransformer is a score bump, not a model</li><li><strong>LinearPersonalREXTransformer</strong> — no training pipeline; weights are manually set via feature flags</li><li><strong>Backfill always appends</strong> — never interleaved with primary results; UX discontinuity</li><li><strong>DynamoDB latency</strong> — item-to-items graph read via Data Pipeline Service (extra hop)</li><li><strong>No session context</strong> — recommendations don't consider current session beyond seed items</li><li><strong>24h cold start</strong> — new items invisible until next daily pipeline run</li><li><strong>Candidate diversity not learned</strong> — category bundling is rule-based, not optimized</li><li><strong>Label quality</strong> — positives from co-clicks (15s window) may include noisy pairs</li><li><strong>No position debiasing</strong> — training data from recommendations pod may have presentation bias</li><li><strong>Limited feedback loop</strong> — pod interaction dataset exists but not widely used for model improvement</li><li><strong>Single mapping type per strategy</strong> — no runtime blending of multiple candidate sources at serving time</li><li><strong>ForceExtraRatioBackfillCalculator(1.0)</strong> — always fetches full num_results from bestsellers even if primary has enough results; wasteful</li></ul>", "variants": [], "source": "products/recommendations/current/offline/pipeline/scheduling.md", "title": "Scheduling & Configuration", "position": 11}, "stacking": {"html": "<h2>Stacking (StackMixer)</h2>\n\n<p>Round-robin merge from multiple candidate sources with dedup.</p>\n\n<pre><code>\nMax candidates per source: 9 (default for REXBackfilled)\n\n\nTotal candidates:          50\n\n\nDeduplication:             by (item_1_id, item_2_id) — first source wins\n\n\nOptional:                  quantile_thresholds per source (score-based filtering)\n\n\n</code></pre>\n\n<h3>Stacking configurations</h3>\n\n<table><tr><th>Stack class</th><th>Default sources</th><th>Strategy</th></tr><tr><td><code>REXBackfilled</code></td><td><code>['ces']</code></td><td>alternative</td></tr><tr><td><code>AlternativeBackfilled</code></td><td><code>['ces']</code></td><td>alternative</td></tr><tr><td><code>ComplementaryBackfilled</code></td><td><code>['comp', 'w2v', 'ces', 'lightfm']</code></td><td>complementary</td></tr><tr><td><code>BundlesBackfilled</code></td><td><code>['freq', 'comp', 'w2v', 'ces', 'lightfm']</code></td><td>bundles</td></tr><tr><td><code>AlternativeImages</code></td><td><code>['vit']</code></td><td>alternative (visual)</td></tr><tr><td><code>ComplementaryLLM</code></td><td><code>['complementary_llm']</code></td><td>complementary (direct, no mix)</td></tr></table>\n\n<h3>Category bundling (optional post-stack)</h3>\n\n<ul><li><code>CandidatesCategoryBundler</code> — reranks candidates to maximize category diversity</li><li><code>CandidatesCategoryBundleFilter</code> — hard filter one item per category</li></ul>", "variants": [], "source": "products/recommendations/current/offline/pipeline/stacking.md", "title": "Stacking (StackMixer)", "position": 7}}, "current_online": {"architecture": {"html": "<h2>Pod Resolution & Configuration</h2>\n\n<h3>Pod Resolution</h3>\n\n<p>Resolution order (priority descending):</p>\n<p>1. Feature flag <code>RECOMMENDATIONS_OVERRIDE_PODS_STRATEGIES</code> (variant keyed by <code>pod_id</code>)</p>\n<p>2. <code>pod_info.strategy_name</code> from MySQL <code>recommendation_pods</code> table</p>\n<p>3. Fallback: <code>bestsellers</code></p>\n\n<p>Pod A/B testing: <code>RECOMMENDATIONS_OVERRIDE_POD_ID</code> + per-page-type flags (<code>HOME</code>, <code>CART</code>, <code>PDP</code>, <code>PLP</code>).</p>\n\n<h3>REXConfig (Per-Pod Configuration)</h3>\n\n<p>Merge order (ascending priority):</p>\n<p>1. <code>default</code> (hardcoded per strategy)</p>\n<p>2. <code>pod_config</code> (from MySQL <code>recommendation_pods.metadata_json['pod_config']</code>)</p>\n<p>3. Feature flag <code>RECOMMENDATIONS_POD_CONFIG</code> (variant by pod_id)</p>\n<p>4. <code>CUSTOMER_DASHBOARD_RECOMMENDATION_PODS_EXPERIMENT_STRATEGY</code></p>\n\n<p><strong>Key fields:</strong></p>\n\n<table><tr><th>Field</th><th>Default</th><th>Description</th></tr><tr><td><code>backfill_with_filtered_items</code></td><td>True</td><td>FilteredItems instead of bestsellers for backfill</td></tr><tr><td><code>strategies_override</code></td><td>None</td><td>Multi-strategy blending (ordered list)</td></tr><tr><td><code>max_num_results</code></td><td>None</td><td>Cap on num_results</td></tr><tr><td><code>bestsellers_metric_name</code></td><td>None</td><td>Override KV metric</td></tr><tr><td><code>diversify_with_facet</code></td><td>None</td><td>Facet-based round-robin diversification</td></tr><tr><td><code>override_similar_items_mapping</code></td><td>None</td><td>Override mapping_type</td></tr><tr><td><code>personalisation_config</code></td><td>None</td><td>Per-pod personalization (boost, config)</td></tr><tr><td><code>use_backfill</code></td><td>None</td><td>Toggle backfilling</td></tr><tr><td><code>exclude_items_config</code></td><td>None</td><td>Exclude clicked/purchased/converted items</td></tr><tr><td><code>use_personalisation</code></td><td>True</td><td>Toggle personalization entirely</td></tr><tr><td><code>refined_backfilling_config</code></td><td>None</td><td>Facet-refined bestsellers backfill</td></tr><tr><td><code>use_user_segmented_bestsellers</code></td><td>None</td><td>Segment-specific bestsellers</td></tr></table>\n\n<h3>Multi-Strategy Blending (StrategiesOverride)</h3>\n\n<p>When <code>strategies_override</code> is configured:</p>\n<p>1. Iterate strategies in config order</p>\n<p>2. Each strategy contributes at most <code>strategy_override.num_results</code> items</p>\n<p>3. Cross-strategy deduplication by <code>item_id</code> (if enabled)</p>\n<p>4. If <code>use_backfill=True</code> — auto-appends bestsellers at the end</p>\n<p>5. Combined result → shared formatting</p>", "variants": [], "source": "products/recommendations/current/online/serving/architecture.md", "title": "Pod Resolution & Configuration", "position": 2}, "personalization": {"html": "<h2>Personalization</h2>\n\n<h3>PersonalizeREXTransformer (primary)</h3>\n\n<p>1. Fetch user history (parallel, across all user IDs)</p>\n<p>2. Compute per-item boost weights via <code>PersonalizationItemsBooster</code>:</p>\n<pre><code>\n   weight(item, action) = 2 * boost_std(action) * (1 - 0.5^count)\n\n\n</code></pre>\n<p>   <code>boost_std</code>: PURCHASE/CONVERSION/CUSTOM=2, others=1. Per-item: max across actions.</p>\n<p>3. Expand weights via <code>SimilarItemsBatchDict.batch_get()</code>:</p>\n<ul><li>For each history item I with weight w, for each similar item J with similarity s:</li><li>J.accumulated_weight += s * w (additive across multiple history items)</li></ul>\n<p>4. Score update:</p>\n<pre><code>\n   personalization_score = accumulated_weight / MAX_USER_HISTORY_BOOST  // normalize ~[0,1]\n\n\n   new_score = original_score + personalization_score * personalization_boost\n\n\n</code></pre>\n<p>   Default <code>personalization_boost = 4.0</code>.</p>\n<p>5. Re-sort by descending score.</p>\n\n<h3>LinearPersonalREXTransformer (linear model, rank blending)</h3>\n\n<p>Features:</p>\n<ul><li><code>one_hot_interaction_{action}_7d</code> — binary: item was {clicked/converted/purchased/...} in 7d</li><li><code>user_hist_avg_{action}_neighbor_sim</code> — sum of <code>similarity(history_item, candidate) * count</code></li><li><code>item_log_score</code> — <code>log(1 + max(0, item.score))</code></li></ul>\n\n<p>Model: <code>predictions = feature_matrix @ weight_vector</code> (no bias, weights from feature flag).</p>\n\n<p>Blending:</p>\n<pre><code>\nrex_rank = rankdata(original_scores)\n\n\npredicts_rank = rankdata(predictions)\n\n\nblended_rank = blending_coefficient * predicts_rank + (1 - blending_coefficient) * rex_rank\n\n\n</code></pre>\n\n<h3>User History</h3>\n\n<table><tr><th>ActionType</th><th>boost_std</th><th>last_actions</th><th>expire_days</th></tr><tr><td><code>PURCHASE</code></td><td>2</td><td>20</td><td>120</td></tr><tr><td><code>CONVERSION</code></td><td>2</td><td>20</td><td>31</td></tr><tr><td><code>CUSTOM_INTERACTION</code></td><td>2</td><td>20</td><td>31</td></tr><tr><td><code>CLICK_THROUGH</code></td><td>1</td><td>20</td><td>31</td></tr><tr><td><code>BROWSE_RESULT_CLICK</code></td><td>1</td><td>20</td><td>31</td></tr><tr><td><code>RESULT_CLICK</code></td><td>1</td><td>20</td><td>31</td></tr><tr><td><code>RECOMMENDATION_RESULT_CLICK</code></td><td>1</td><td>20</td><td>31</td></tr><tr><td><code>SEARCH_RESULT_CLICK</code></td><td>1</td><td>20</td><td>31</td></tr><tr><td><code>ITEM_DETAIL_LOAD</code></td><td>1</td><td>20</td><td>31</td></tr><tr><td><code>SELECT</code></td><td>1</td><td>20</td><td>31</td></tr><tr><td><code>ASSISTANT_SEARCH_RESULT_CLICK</code></td><td>1</td><td>20</td><td>31</td></tr><tr><td><code>QUIZ_RESULT_CLICK</code></td><td>1</td><td>20</td><td>31</td></tr></table>\n\n<p><strong>History fetching:</strong> parallel ThreadPoolExecutor across all user IDs (<code>customer_user_id</code>, <code>constructor_user_id</code>, <code>additional_constructor_user_ids</code>). Merge: concatenate per-action, dedup preserving order, sort ascending by timestamp.</p>\n\n<p><strong>Additional user ID mapping:</strong> feature flag <code>RECOMMENDATIONS_UI_TO_I_HISTORY_MAPPING</code> — maps <code>customer_user_id</code> → up to 5 internal <code>constructor_user_ids</code> via user-segments service (channel: <code>email</code>).</p>", "variants": [], "source": "products/recommendations/current/online/serving/personalization.md", "title": "Personalization", "position": 3}, "postprocessing": {"html": "<h2>Post-processing</h2>\n\n<h3>Backfill</h3>\n\n<p><strong>FillGapBackfillCalculator:</strong> <code>needed = max(0, target - current)</code>.</p>\n\n<p><strong>ForceExtraRatioBackfillCalculator(ratio=1.0):</strong> always fetches at least <code>target * ratio</code> items from bestsellers, regardless of gap. Default in production: <code>ratio=1.0</code> (always at least num_results bestseller items appended).</p>\n\n<p>Backfill items are appended after primary (never interleaved), tagged <code>is_backfilled=True</code>.</p>\n\n<p><strong>Refined backfilling:</strong> facet-refined bestsellers — fetches top items for seed item's specific facet value instead of global bestsellers.</p>\n\n<h3>Diversification</h3>\n\n<p><code>DiversifyWithFacetTransformer</code> — round-robin interleaving by facet value:</p>\n<p>1. Group items by <code>tuple(sorted(facet_values))</code> for specified facet</p>\n<p>2. Split into consecutive strategy chunks (preserves strategy ordering)</p>\n<p>3. Per chunk: round-robin pop one item from each facet-value group until exhausted</p>\n<p>4. Optional <code>num_results_to_diversify</code> cap (rest appended in original order)</p>\n\n<h3>Merchandising</h3>\n\n<p><code>MerchandisingFilteringAndSortingREXTransformer</code>:</p>\n\n<p><strong>V1 mode</strong> (no index fetch): converts ranks to scores, applies boost/bury/slot/blacklist/whitelist via <code>terms_processor.get_results_for_iterator()</code>.</p>\n\n<p>Score formula:</p>\n<pre><code>\nscore = IDEAL_AVERAGE + 4 * IDEAL_STD + MAX_BOOST_COEFFICIENT * BOOST_RULE_MULTIPLIER * IDEAL_STD / (REX_ALPHA * rank + 1)\n\n\n</code></pre>\n\n<p><strong>V2 mode</strong> (feature flag <code>RECOMMENDATIONS_COMBINED_FILTERED_MERCHANDISING</code>): combined fetch + merchandising in one Index Service call. For strategies with filters/collections/whitelists.</p>\n\n<h3>Deduplication</h3>\n\n<p><strong>By item_id:</strong> exact match. Excludes: <code>args.exclude_item_ids</code> (from user history exclusion config) + <code>args.item_ids</code> (seed items).</p>\n\n<p><strong>By item name</strong> (response-time): exact string equality on <code>item['value']</code>. Per <code>(name, slice_facet)</code> — different color slices of same product name can coexist if slice differs.</p>\n\n<h3>Recall Boosting</h3>\n\n<p>Internal fetch size: <code>2 * num_results</code> (hardcoded <code>RECALL_BOOST_COEFFICIENT = 2</code>). Bumped to <code>MAX_NUM_RESULTS_RECOMMENDATIONS</code> (200) when whitelist filters present. Extra added for excluded + blacklisted items.</p>\n\n<h3>Item Exclusion from User History</h3>\n\n<p>Per-pod via <code>ExcludeItemsConfig</code>:</p>\n<ul><li><code>exclude_clicked</code> / <code>exclude_clicked_period</code> (days)</li><li><code>exclude_purchased</code> / <code>exclude_purchased_period</code></li><li><code>exclude_converted</code> / <code>exclude_converted_period</code></li></ul>\n\n<p>Fetches user history via parallel <code>ThreadPoolExecutor</code>, all excluded IDs passed to <code>DeduplicateREXTransformer</code>.</p>\n\n<h3>Sponsored Listings</h3>\n\n<p>Feature flag: <code>SPONSORED_LISTINGS_RECOMMENDATIONS</code>. External service call with <code>pod_id</code>, <code>strategy_id</code>, <code>num_results_per_page</code>, filters, etc. Sponsored items returned with <code>is_retail_media=True</code>, slotted by <code>terms_processor</code>.</p>\n\n<h3>Circuit Breakers</h3>\n\n<ul><li><code>user_segments_service</code> — <code>user_segments_breaker</code></li><li><code>sponsored_listings_service</code> — <code>sponsored_listings_breaker</code></li><li><code>facet_storage</code> (DynamoDB) — <code>facet_db_breaker</code></li><li>User history: <code>enable_circuit_breakers</code> flag from <code>ac_config</code></li></ul>\n\n<h3>Caching</h3>\n\n<ul><li>Response-level: <code>Cache-Control: no-cache</code> (explicit, all rec responses)</li><li>Request-scoped: facet storage created at most once per request per backend</li><li>Index Service timeout: <code>ac_config.rex_index_service_recommendations_timeout</code> (separate from search)</li></ul>", "variants": [], "source": "products/recommendations/current/online/serving/postprocessing.md", "title": "Post-processing", "position": 4}, "rex_service": {"html": "<h2>rex_service (Standalone Microservice)</h2>\n\n<pre><code>\nFramework:      FastAPI\n\n\nPort:           8097\n\n\nDeploy:         AWS ECS Fargate\n\n\nStrategies:     bestsellers, filtered_items (only)\n\n\nBackend:        direct gRPC to InvertedIndexConnector (no monolith TermsProcessor)\n\n\nMax results:    500 (internal)\n\n\nPod cache:      PodInfoProvider (MySQL, background refresh)\n\n\nFeatures:       FeaturesProvider (DB + EFT v1/v2 from S3, background refresh)\n\n\n</code></pre>\n\n<h3>apply_merchandising_and_filtering()</h3>\n\n<p>1. Build browse/collection iterators</p>\n<p>2. Build facet iterators (blacklist/whitelist/boost/filter)</p>\n<p>3. Execute Index Service query (gRPC)</p>\n<p>4. Convert to <code>RecommendationItem</code> with strategy_id, is_backfilled, labels</p>\n\n<h3>Serving comparison</h3>\n\n<table><tr><th>Aspect</th><th>fuzzy_autocomplete_server (legacy)</th><th>rex_service (new)</th></tr><tr><td>Framework</td><td>Flask</td><td>FastAPI</td></tr><tr><td>Strategies</td><td>All 12+</td><td>bestsellers, filtered_items only</td></tr><tr><td>Index access</td><td>via KV Service + TermsProcessor</td><td>direct gRPC to InvertedIndexConnector</td></tr><tr><td>Personalization</td><td>Full (PersonalizeREX, LinearPersonalREX)</td><td>None</td></tr><tr><td>Status</td><td>Production, all customers</td><td>Production, limited strategies</td></tr></table>", "variants": [], "source": "products/recommendations/current/online/serving/rex_service.md", "title": "rex_service (New Microservice)", "position": 5}, "strategies": {"html": "<h2>Strategies & Recommenders</h2>\n\n<table><tr><th>Strategy</th><th>Recommender</th><th>Data Source</th><th>Mapping Type</th></tr><tr><td><code>alternative_items</code></td><td>SimilarItemsRecommender</td><td>Item-to-items graph</td><td><code>neighbor_items</code> (overridable)</td></tr><tr><td><code>complementary_items</code></td><td>SimilarItemsRecommender</td><td>Item-to-items graph</td><td><code>complementary_items</code> (overridable)</td></tr><tr><td><code>bundles</code></td><td>SimilarItemsRecommender</td><td>Item-to-items graph</td><td><code>frequent_itemsets_items</code> (overridable)</td></tr><tr><td><code>visually_similar_items</code></td><td>SimilarItemsRecommender</td><td>Item-to-items graph</td><td><code>neighbor_items_images</code></td></tr><tr><td><code>custom_item_item</code></td><td>SimilarItemsRecommender</td><td>Item-to-items graph</td><td>customer-defined mapping</td></tr><tr><td><code>custom_user_item</code></td><td>UserToItemsRecommender</td><td>User-to-items KV</td><td>customer-defined mapping</td></tr><tr><td><code>bestsellers</code></td><td>TopItemsStatsRecommender</td><td>Top items stats KV</td><td>metric: <code>conversion_cnt_31d</code></td></tr><tr><td><code>filtered_items</code></td><td>FilteredItemsRecommender</td><td>Inverted Index (browse)</td><td>—</td></tr><tr><td><code>recently_viewed_items</code></td><td>RecentlyViewedRecommender</td><td>User history service</td><td>—</td></tr><tr><td><code>abandoned_in_cart</code></td><td>AbandonedInCartRecommender</td><td>User history service</td><td>—</td></tr><tr><td><code>buy_it_again</code></td><td>BuyItAgainRecommender</td><td>User history service</td><td>—</td></tr><tr><td><code>user_featured_items</code></td><td>UserFeaturedItemsRecommender</td><td>History + neighbor graph</td><td><code>neighbor_items</code></td></tr><tr><td><code>query_recommendations</code></td><td>QueryItemsRecommender</td><td>Query-to-items KV</td><td><code>recommendations</code></td></tr></table>\n\n<h3>Strategy execution flow</h3>\n\n<pre><code>\nPod endpoint: /recommendations/v1/pods/&lt;pod_id&gt;\n\n\n    Pod → strategy resolution (MySQL + feature flags + A/B)\n\n\n\n\n\nStrategy execution:\n\n\n    ├── SimilarItemsRecommender (alternative, complementary, bundles, visual, custom_item_item)\n\n\n    ├── TopItemsStatsRecommender (bestsellers)\n\n\n    ├── FilteredItemsRecommender (filtered_items, browse-like)\n\n\n    ├── RecentlyViewedRecommender (user history)\n\n\n    ├── AbandonedInCartRecommender (cart - purchases)\n\n\n    ├── BuyItAgainRecommender (purchase history)\n\n\n    ├── UserFeaturedItemsRecommender (history → expand via neighbor graph)\n\n\n    ├── QueryItemsRecommender (zero-result search fallback)\n\n\n    └── UserToItemsRecommender (custom_user_item, BYOM)\n\n\n</code></pre>\n\n<h3>Serving Data Path</h3>\n\n<pre><code>\nData Pipeline → S3 (JSONL) → DynamoDB upload\n\n\n                                    ↓\n\n\n                          Data Pipeline Service (gRPC/HTTP)\n\n\n                                    ↓\n\n\n                          KV Service connector (fuzzy_autocomplete_server)\n\n\n                                    ↓\n\n\n                          SimilarItemsBatchDict.batch_get(customer_ids)\n\n\n                                    ↓\n\n\n                          {customer_id: {mapping_type: {candidate_id: score}}}\n\n\n</code></pre>\n\n<p><code>multi_get(customer_ids)</code> returns full merged graph. Specific <code>mapping_type</code> extracted at strategy level.</p>\n\n<p>Variation key fallback: tries <code>{item_id}<SEP>{variation_id}</code> first, falls back to bare <code>item_id</code>.</p>", "variants": [], "source": "products/recommendations/current/online/serving/strategies.md", "title": "Strategies & Recommenders", "position": 1}}}, "diagrams": [{"id": "current_offline", "label": "Current Offline", "group": "current", "sublabel": "Offline", "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 380 780\" font-family=\"monospace\" font-size=\"12\">\n  <defs>\n    <marker id=\"b\" markerWidth=\"8\" markerHeight=\"8\" refX=\"7\" refY=\"4\" orient=\"auto\"><path d=\"M0,1 L7,4 L0,7\" fill=\"none\" stroke=\"#475569\" stroke-width=\"1.2\"/></marker>\n  </defs>\n\n  <!-- Title -->\n  <text x=\"190\" y=\"20\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"10\">CURRENT STATE — OFFLINE PIPELINE</text>\n\n  <!-- Candidate Generation -->\n  <g data-click=\"embeddings\" style=\"cursor:pointer\">\n    <rect x=\"10\" y=\"35\" width=\"360\" height=\"220\" rx=\"8\" fill=\"#f8fafc\" stroke=\"#64748b\"/>\n    <text x=\"190\" y=\"55\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"12\" font-weight=\"bold\">Candidate Generation</text>\n  </g>\n\n  <g data-click=\"embeddings\" style=\"cursor:pointer\">\n    <rect x=\"25\" y=\"65\" width=\"155\" height=\"28\" rx=\"5\" fill=\"#f3f0ff\" stroke=\"#7c3aed\"/>\n    <text x=\"102\" y=\"83\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"10\">Embeddings (Granne)</text>\n  </g>\n  <g data-click=\"lightfm\" style=\"cursor:pointer\">\n    <rect x=\"195\" y=\"65\" width=\"155\" height=\"28\" rx=\"5\" fill=\"#e7f5ff\" stroke=\"#339af0\"/>\n    <text x=\"272\" y=\"83\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"10\">LightFM (CF + i2i)</text>\n  </g>\n  <g data-click=\"w2v\" style=\"cursor:pointer\">\n    <rect x=\"25\" y=\"100\" width=\"155\" height=\"28\" rx=\"5\" fill=\"#fff9db\" stroke=\"#f59f00\"/>\n    <text x=\"102\" y=\"118\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"10\">Word2Vec</text>\n  </g>\n  <g data-click=\"vit\" style=\"cursor:pointer\">\n    <rect x=\"195\" y=\"100\" width=\"155\" height=\"28\" rx=\"5\" fill=\"#e6fcf5\" stroke=\"#2b8a3e\"/>\n    <text x=\"272\" y=\"118\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"10\">ViT / Image</text>\n  </g>\n  <g data-click=\"dual_encoder\" style=\"cursor:pointer\">\n    <rect x=\"25\" y=\"135\" width=\"155\" height=\"28\" rx=\"5\" fill=\"#fff5f5\" stroke=\"#e03131\"/>\n    <text x=\"102\" y=\"153\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"10\">Dual-Encoder (LLM)</text>\n  </g>\n  <g data-click=\"graph_methods\" style=\"cursor:pointer\">\n    <rect x=\"195\" y=\"135\" width=\"155\" height=\"28\" rx=\"5\" fill=\"#e0f2fe\" stroke=\"#0ea5e9\"/>\n "190\" y=\"415\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"9\">pairwise stats + embedding scores + catalog attrs</text>\n  </g>\n\n  <line x1=\"190\" y1=\"436\" x2=\"190\" y2=\"456\" stroke=\"#475569\" stroke-width=\"1.5\" marker-end=\"url(#b)\"/>\n\n  <!-- LLM Filtering -->\n  <g data-click=\"llm_labeling\" style=\"cursor:pointer\">\n    <rect x=\"60\" y=\"459\" width=\"260\" height=\"45\" rx=\"6\" fill=\"#f8fafc\" stroke=\"#64748b\"/>\n    <text x=\"190\" y=\"479\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"11\" font-weight=\"bold\">LLM Filtering/Boosting</text>\n    <text x=\"190\" y=\"494\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"9\">GPT-labeled pairs: filter irrelevant or boost</text>\n  </g>\n\n  <line x1=\"190\" y1=\"504\" x2=\"190\" y2=\"524\" stroke=\"#475569\" stroke-width=\"1.5\" marker-end=\"url(#b)\"/>\n\n  <!-- Index Building -->\n  <g data-click=\"indexing\" style=\"cursor:pointer\">\n    <rect x=\"10\" y=\"527\" width=\"360\" height=\"80\" rx=\"8\" fill=\"#f8fafc\" stroke=\"#64748b\"/>\n    <text x=\"190\" y=\"552\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"11\" font-weight=\"bold\">Index Building & Graph Merge</text>\n    <text x=\"190\" y=\"571\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"9\">per-strategy JSONL → MergeSimilarItemsGraphsV2</text>\n    <text x=\"190\" y=\"586\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"9\">{seed_item → {mapping_type → {candidate: score}}}</text>\n  </g>\n\n  <line x1=\"190\" y1=\"607\" x2=\"190\" y2=\"627\" stroke=\"#475569\" stroke-width=\"1.5\" marker-end=\"url(#b)\"/>\n\n  <!-- DynamoDB -->\n  <g data-click=\"indexing\" style=\"cursor:pointer\">\n    <rect x=\"60\" y=\"630\" width=\"260\" height=\"55\" rx=\"6\" fill=\"#e0f2fe\" stroke=\"#0ea5e9\"/>\n    <text x=\"190\" y=\"653\" text-anchor=\"middle\" fill=\"#0c4a6e\" font-size=\"11\" font-weight=\"bold\">DynamoDB + KV Service</text>\n    <text x=\"190\" y=\"672\" text-anchor=\"middle\" fill=\"#64748b\" f </td></tr><tr><td>Ranking</td><td>Ordering related queries by expected utility</td><td>TODO</td></tr><tr><td>Deduplication</td><td>Merging near-duplicate queries</td><td>TODO</td></tr></table>\n\n<h3>Generation Approaches</h3>\n\n<ul><li><strong>Session co-occurrence:</strong> queries issued in same session → related</li><li><strong>Click overlap:</strong> queries leading to clicks on same items → related</li><li><strong>Embedding similarity:</strong> queries close in semantic space → related</li><li><strong>LLM generation:</strong> generate reformulations / refinements of the query</li></ul>", "variants": [], "source": "products/related_searches/current/online/overview/overview.md", "title": "Related Searches Overview", "position": 1}}}, "diagrams": [{"id": "current_online", "label": "Current Online", "group": "current", "sublabel": "Online", "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 380 300\" font-family=\"monospace\" font-size=\"12\">\n  <rect x=\"0\" y=\"0\" width=\"380\" height=\"300\" fill=\"#f8fafc\"/>\n  <text x=\"190\" y=\"20\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"10\">RELATED SEARCHES — CURRENT STATE</text>\n\n  <g data-click=\"overview\" style=\"cursor:pointer\">\n    <rect x=\"40\" y=\"50\" width=\"300\" height=\"50\" rx=\"8\" fill=\"#fef3c7\" stroke=\"#f59e0b\" stroke-dasharray=\"4\"/>\n    <text x=\"190\" y=\"80\" text-anchor=\"middle\" fill=\"#92400e\" font-size=\"11\">Query Co-occurrence Mining</text>\n  </g>\n\n  <g data-click=\"overview\" style=\"cursor:pointer\">\n    <rect x=\"40\" y=\"120\" width=\"300\" height=\"50\" rx=\"8\" fill=\"#e0f2fe\" stroke=\"#0ea5e9\" stroke-dasharray=\"4\"/>\n    <text x=\"190\" y=\"150\" text-anchor=\"middle\" fill=\"#0c4a6e\" font-size=\"11\">Semantic Similarity</text>\n  </g>\n\n  <g data-click=\"overview\" style=\"cursor:pointer\">\n    <rect x=\"40\" y=\"190\" width=\"300\" height=\"50\" rx=\"8\" fill=\"#f0fdf4\" stroke=\"#22c55e\" stroke-dasharray=\"4\"/>\n    <text x=\"190\ function sourceLink(source) {
  if (!source) return '';
  const ghUrl = `https://github.com/Constructor-io/ml_design_page/blob/master/${source}`;
  return `<div class="source-link"><a href="${ghUrl}" target="_blank" class="path">${source}</a></div>`;
}

function show(blockId) {
  const block = currentBlocks[blockId];
  if (!block) return;

  let html = '';
  html += sourceLink(block.source);

  if (block.variants && block.variants.length > 1) {
    html += '<div class="variant-tabs">';
    block.variants.forEach(v => {
      const cls = v.status === 'proposal' ? 'proposal' : '';
      html += `<button class="${cls}" onclick="showVariant('${blockId}', '${v.id}')">${v.author}: ${v.title}</button>`;
    });
    html += '</div>';
  } else if (block.variants && block.variants.length === 1) {
    const v = block.variants[0];
    html += `<div class="author-tag">Also: <a href="#" class="block-ref" onclick="showVariant('${blockId}', '${v.id}'); return false;">${v.author}: ${v.title}</a> <span class="status-badge ${v.status}">${v.status}</span></div>`;
  }

  html += `<div id="variant-content">${block.html}</div>`;
  document.getElementById("pc").innerHTML = html;
}

function showVariant(blockId, variantId) {
  const block = currentBlocks[blockId];
  if (!block) return;

  let content = '';
  let variantSource = '';
  if (variantId === 'default') {
    content = block.html;
    variantSource = sourceLink(block.source);
  } else {
    const variant = block.variants.find(v => v.id === variantId);
    if (!variant) return;
    variantSource = sourceLink(variant.source);
    content = `<div class="author-tag">Author: ${variant.author} | Status: <span class="status-badge ${variant.status}">${variant.status}</span></div>`;
    if (variant.summary) content += `<blockquote>${variant.summary}</blockquote>`;
    content += variant.html;
  }

  const srcEl = document.querySelector('.source-link');
  if (srcEl && variantSource) srcEl.outerHTML = variantSource;
  else if (srcEl && !variantSource) srcEl.outerHTML = '';

  document.getElementById("variant-content").innerHTML = content;

  const tabs = document.querySelectorAll('.variant-tabs button');
  tabs.forEach((tab, i) => {
    tab.classList.remove('active');
    if (i === 0 && variantId === 'default') tab.classList.add('active');
  });
  if (variantId !== 'default') {
    const variant = block.variants.find(v => v.id === variantId);
    if (variant) {
      tabs.forEach(tab => {
        if (tab.textContent.includes(variant.author)) tab.classList.add('active');
      });
    }
  }
}

function hide() {
  document.getElementById("pc").innerHTML = '<div id="placeholder">Click on any block to see details</div>';
}

// Global mode state (persists across product switches)
let modeGroup = 'target';
let modeVariant = 'online';
const DEFAULT_PRODUCT = 'search';

function setMode(group, variant) {
  if (group !== undefined) modeGroup = group;
  if (variant !== undefined) modeVariant = variant;
  updateSegControls();
  showCurrentDiagram();
}

function updateSegControls() {
  // Derive available groups and variants from current diagrams
  const groups = [...new Set(currentDiagrams.map(d => d.group))];
  const variants = [...new Set(currentDiagrams.map(d => d.sublabel.toLowerCase()))];

  const segGroup = document.getElementById('seg-group');
  const segVariant = document.getElementById('seg-variant');

  // Render group segment (Current / Target)
  if (groups.length > 1) {
    segGroup.style.display = 'inline-flex';
    segGroup.innerHTML = groups.map(g =>
      `<button class="${g === modeGroup ? 'active' : ''}" onclick="setMode('${g}')">${g.charAt(0).toUpperCase() + g.slice(1)}</button>`
    ).join('');
  } else if (groups.length === 1) {
    segGroup.style.display = 'none';
    modeGroup = groups[0];
  } else {
    segGroup.style.display = 'none';
  }

  // Render variant segment (Online / Offline)
  if (variants.length > 1) {
    segVariant.style.display = 'inline-flex';
    segVariant.innerHTML = variants.map(v =>
      `<button class="${v === modeVariant ? 'active' : ''}" onclick="setMode(undefined,'${v}')">${v.charAt(0).toUpperCase() + v.slice(1)}</button>`
    ).join('');
  } else if (variants.length === 1) {
    segVariant.style.display = 'none';
    modeVariant = variants[0];
  } else {
    segVariant.style.display = 'none';
  }
}

function showCurrentDiagram() {
  const diagram = currentDiagrams.find(d =>
    d.group === modeGroup && d.sublabel.toLowerCase() === modeVariant
  );
  const container = document.getElementById("svg-container");
  let activeViewId = null;
  if (diagram) {
    container.innerHTML = diagram.svg;
    activeViewId = diagram.id;
  } else {
    // Fallback: try just group match, then first available
    const groupMatch = currentDiagrams.find(d => d.group === modeGroup);
    if (groupMatch) {
      modeVariant = groupMatch.sublabel.toLowerCase();
      container.innerHTML = groupMatch.svg;
      activeViewId = groupMatch.id;
      updateSegControls();
    } else if (currentDiagrams.length > 0) {
      modeGroup = currentDiagrams[0].group;
      modeVariant = currentDiagrams[0].sublabel.toLowerCase();
      container.innerHTML = currentDiagrams[0].svg;
      activeViewId = currentDiagrams[0].id;
      updateSegControls();
    } else {
      container.innerHTML = '<div class="empty-state">No diagram for this view</div>';
    }
  }
  // Switch blocks to match current view
  currentBlocks = (activeViewId && currentBlocksByView[activeViewId]) || {};
  hide();
}

function openDrawer() {
  document.getElementById('nav-drawer').classList.add('open');
  document.getElementById('nav-backdrop').classList.add('open');
}

function closeDrawer() {
  document.getElementById('nav-drawer').classList.remove('open');
  document.getElementById('nav-backdrop').classList.remove('open');
}

function switchProduct(productId) {
  currentProduct = productId;
  const data = PRODUCTS_DATA[productId];
  currentBlocksByView = data.blocks_by_view || {};
  currentDiagrams = data.diagrams;

  // Update drawer active state
  document.querySelectorAll('#nav-drawer-list button').forEach(btn => {
    btn.className = btn.dataset.id === productId ? 'active' : '';
  });

  // Update label
  const product = PRODUCTS.find(p => p.id === productId);
  document.getElementById('current-product-label').textContent = product ? product.label : productId;

  // Update segmented controls and show diagram for current mode
  updateSegControls();
  showCurrentDiagram();

  closeDrawer();
  hide();
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") { closeDrawer(); hide(); }
});

document.addEventListener("DOMContentLoaded", function() {
  // Build drawer product list
  const listEl = document.getElementById("nav-drawer-list");
  PRODUCTS.forEach((p) => {
    const btn = document.createElement('button');
    btn.textContent = p.label;
    btn.dataset.id = p.id;
    btn.onclick = () => switchProduct(p.id);
    listEl.appendChild(btn);
  });

  // Select default product (search/target/online)
  const startProduct = PRODUCTS_DATA[DEFAULT_PRODUCT] ? DEFAULT_PRODUCT : (PRODUCTS.length > 0 ? PRODUCTS[0].id : null);
  if (startProduct) {
    switchProduct(startProduct);
  }

  // Handle clicks on SVG blocks
  document.getElementById("svg-container").addEventListener("click", function(e) {
    const g = e.target.closest("[data-click]");
    if (g) show(g.getAttribute("data-click"));
  });
});
</script>
</body>
