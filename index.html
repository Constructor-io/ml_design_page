>LLM filtering</text>\n  </g>\n\n  <!-- Arrow LLM → L1 -->\n  <line x1=\"190\" y1=\"497\" x2=\"190\" y2=\"517\" stroke=\"#475569\" stroke-width=\"1.5\" marker-end=\"url(#a)\"/>\n\n  <!-- L1 reranker section -->\n  <g data-click=\"l1_overview\" style=\"cursor:pointer\">\n    <rect x=\"10\" y=\"520\" width=\"360\" height=\"200\" rx=\"8\" fill=\"#f8fafc\" stroke=\"#64748b\"/>\n    <text x=\"190\" y=\"540\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"12\" font-weight=\"bold\">L1: Reranker</text>\n  </g>\n\n  <g data-click=\"stageA\" style=\"cursor:pointer\">\n    <rect x=\"25\" y=\"550\" width=\"340\" height=\"55\" rx=\"6\" fill=\"#e0f2fe\" stroke=\"#0ea5e9\"/>\n    <text x=\"195\" y=\"573\" text-anchor=\"middle\" fill=\"#0c4a6e\" font-size=\"11\" font-weight=\"bold\">Stage A</text>\n    <text x=\"195\" y=\"593\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"10\">(GBDT, all ~1000 candidates) → 100-200</text>\n  </g>\n\n  <!-- Arrow A → B -->\n  <line x1=\"195\" y1=\"605\" x2=\"195\" y2=\"620\" stroke=\"#475569\" stroke-width=\"1\" marker-end=\"url(#a)\"/>\n  <text x=\"225\" y=\"616\" fill=\"#64748b\" font-size=\"9\">100-200 candidates</text>\n\n  <g data-click=\"stageB\" style=\"cursor:pointer\">\n    <rect x=\"25\" y=\"623\" width=\"340\" height=\"55\" rx=\"6\" fill=\"#e0f2fe\" stroke=\"#0ea5e9\"/>\n    <text x=\"195\" y=\"646\" text-anchor=\"middle\" fill=\"#0c4a6e\" font-size=\"11\" font-weight=\"bold\">Stage B</text>\n    <text x=\"195\" y=\"666\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"10\">(Neural, listwise) → final order</text>\n  </g>\n\n  <!-- Arrow → Post -->\n  <line x1=\"190\" y1=\"720\" x2=\"190\" y2=\"740\" stroke=\"#475569\" stroke-width=\"1.5\" marker-end=\"url(#a)\"/>\n\n  <!-- Postprocessing -->\n  <g data-click=\"post\" style=\"cursor:pointer\">\n    <rect x=\"10\" y=\"743\" width=\"360\" height=\"48\" rx=\"6\" fill=\"#f8fafc\" stroke=\"#64748b\"/>\n    <text x=\"190\" y=\"763\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"11\" font-weight=\"bold\">Postprocessing</text>\n    <text x=\"190\" y=\"780\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"9\">Merchandising, diversity, slotting</text>\n  </g>\n\n  <!-- Arrow → SERP -->\n  <line x1=\"190\" y1=\"791\" x2=\"190\" y2=\"808\" stroke=\"#475569\" stroke-width=\"1.5\" marker-end=\"url(#a)\"/>\n  <text x=\"190\" y=\"820\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"11\" font-weight=\"bold\">Final SERP</text>\n</svg>"}], "block_count": 36, "diagram_count": 3}, "browse": {"blocks_by_view": {"current_online": {"overview": {"html": "<h2>Browse</h2>\n\n<p>Category and collection navigation — when users explore products by browsing categories rather than searching. Includes sorting, filtering, faceted navigation, and within-category ranking.</p>\n\n<h3>Key Components</h3>\n\n<table><tr><th>Component</th><th>Description</th><th>Status</th></tr><tr><td>Category navigation</td><td>Hierarchical category tree traversal</td><td>TODO</td></tr><tr><td>Faceted filtering</td><td>Dynamic facets based on category attributes</td><td>TODO</td></tr><tr><td>Within-category ranking</td><td>ML-based ordering within a category page</td><td>TODO</td></tr><tr><td>Personalization</td><td>Per-user reranking of category results</td><td>TODO</td></tr></table>\n\n<h3>Differences from Search</h3>\n\n<ul><li>No query — user navigates by clicking categories</li><li>All products in category are candidates (no retrieval step)</li><li>Ranking is the primary ML component</li><li>Facets are pre-computed per category, not per query</li></ul>", "variants": [], "source": "products/browse/current/online/overview/overview.md", "title": "Browse Overview", "position": 1}}}, "diagrams": [{"id": "current_online", "label": "Current Online", "group": "current", "sublabel": "Online", "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 380 300\" font-family=\"monospace\" font-size=\"12\">\n  <rect x=\"0\" y=\"0\" width=\"380\" height=\"300\" fill=\"#f8fafc\"/>\n  <text x=\"190\" y=\"20\" text-anchor=\"middle\" fill=\"#94a3b8\" font-size=\"10\">BROWSE — CURRENT STATE</text>\n\n  <g data-click=\"overview\" style=\"cursor:pointer\">\n    <rect x=\"40\" y=\"50\" width=\"300\" height=\"50\" rx=\"8\" fill=\"#fef3c7\" stroke=\"#f59e0b\" stroke-dasharray=\"4\"/>\n    <text x=\"190\" y=\"80\" text-anchor=\"middle\" fill=\"#92400e\" font-size=\"11\">Category / Collection Navigation</text>\n  </g>\n\n  <g data-click=\"overview\" style=\"cursor:pointer\">\n    <rect x=\"40\" y=\"120\" width=\"300\" height=\"50\" rx=\"8\" fill=\"#e0f2fe\" stroke=\"#0ea5e9\" stroke-dasharray=\"4\"/>\n    <text x=\"190\" y=\"150\" text-anchor=\"middle\" fill=\"#0c4a6e\" font-size=\"11\">Filtering + Facets</text>\n  </g>\n\n  <g data-click=\"overview\" style=\"cursor:pointer\">\n    <rect x=\"40\" y=\"190\" width=\"300\" height=\"50\" rx=\"8\" fill=\"#f0fdf4\" stroke=\"#22c55e\" stroke-dasharray=\"4\"/>\n    <text x=\"190\" y=\"220\" text-anchor=\"middle\" fill=\"#166534\" font-size=\"11\">Ranking within Category</text>\n  </g>\n\n  <text x=\"190\" y=\"275\" text-anchor=\"middle\" fill=\"#cbd5e1\" font-size=\"10\" font-style=\"italic\">TODO: detailed architecture diagram</text>\n</svg>"}], "block_count": 1, "diagram_count": 1}, "search_suggestions": {"blocks_by_view": {"current_offline": {"dawg": {"html": "<h2>DAWG, Trigram DB & Vocabulary</h2>\n\n<h3>DAWG (Directed Acyclic Word Graph)</h3>\n\n<p><code>RecordDAWG</code> with format <code>'>II'</code> (two uint32 values per entry).</p>\n\n<p><strong>Structure:</strong> prefix_string → <code>(highest_dsi_score, unwrap_score)</code>.</p>\n\n<ul><li><code>highest_dsi_score (HTS)</code>: max normalized score among items whose token exactly equals this prefix (full-token match only; 0 for non-terminal prefixes)</li><li><code>unwrap_score (UWS)</code>: max score among items whose token <strong>starts with</strong> this prefix (used to decide whether to recurse)</li></ul>\n\n<p><strong>Stored entries (necessary prefixes only):</strong></p>\n<ul><li>Full tokens (terminal nodes)</li><li>Single characters (length=1)</li><li>Branch nodes (≥2 distinct successor characters)</li></ul>\n\n<p>All other prefixes are implicit — the DAWG is compressed.</p>\n\n<p><strong>Prefix → results traversal (<code>get_spelling_suggestions_prefix</code>):</strong></p>\n<p>1. Strip spaces. If len ≤ 2: return direct prefix completions (no fuzzy)</p>\n<p>2. <code>get_branches_to_check_from_trigrams(prefix[:5], trigram_db)</code> → seed DAWG branches</p>\n<p>3. <code>cull_branches_prefix(branches, prefix, min_score, max_score)</code> → compute fuzzy match score per branch, remove low-scoring</p>\n<p>4. Sort branches by fuzzy score ascending (best = last for <code>pop()</code>)</p>\n<p>5. Loop: <code>unwrap_branches()</code> — pick best branch, expand children, collect results</p>\n<p>6. Add direct prefix completions (exact matches)</p>\n<p>7. Sort by score descending, return top <code>num_results</code></p>\n\n<p><strong>UWS usage:</strong> <code>unwrap_score > 0</code> means \"there exist descendants worth exploring\". After expansion, set to 0 to prevent re-traversal.</p>\n\n<h3>Trigram DB</h3>\n\n<p>Pre-computed acceleration cache for DAWG fuzzy matching. Keyvi JSON dictionary.</p>\n\n<p><strong>Key:</strong> query prefix (3-5 characters). <strong>Value:</strong> list of DAWG branch node prefixes to seed traversal.</p>\n\n<p><strong>Build algorithm:</strong></p>\n<p>1. Collect popular prefixes from query logs (95th percentile frequency, 7 days, top-N unique)</p>\n<p>2. Min guarantee: 10,000 prefixes (supplement from DAWG tokens sorted by score if fewer)</p>\n<p>3. For each prefix <code>p</code>:</p>\n<ul><li>Run <code>dawg.get_trigram_prefixes(p)</code> — DAWG fuzzy-match traversal</li><li>Extract first <code>len(p)-2</code> characters of each matched branch → \"trigram\" prefix</li><li>Add exact-match prefix <code>p[:len(p)-2]</code> if reachable in DAWG</li><li>Store <code>(p, [trigram_1, trigram_2, ...])</code> in Keyvi</li></ul>\n\n<p><strong>Query-time usage:</strong></p>\n<pre><code>if prefix[:5] in trigram_db:\n    branch_nodes = trigram_db[prefix[:5]]   # pre-computed starting points\n    branches = [dawg.branch_data(node) for node in branch_nodes]\nelse:\n    branches = dawg.get_branches_to_check('')   # fallback: start from root</code></pre>\n\n<p>Eliminates O(vocabulary) scan at query time — only relevant branches are checked.</p>\n\n<h3>Vocabulary (Keyvi — Alternative Correction Engine)</h3>\n\n<p>FSA-based compressed dictionary: <code>token → max_score</code>. Built from all catalog tokens (max score across items per token) + synonyms at IDEAL_AVERAGE score.</p>\n\n<p><strong>Used by QT-124 (feature <code>USE_KEYVI_CORRECTIONS</code>)</strong> as replacement for DAWG+TrigramDB:</p>\n<ul><li><code>get_fuzzy_corrections(token, max_edit_distance, num)</code> — Keyvi native fuzzy lookup</li><li><code>get_fuzzy_completions(token, max_edit_distance, min_exact_prefix=1)</code> — prefix completion</li></ul>\n\n<p><strong>Edit distance thresholds (length-based):</strong></p>\n\n<table><tr><th>Token length</th><th>Max edit distance</th><th>Max results</th></tr><tr><td>< 3</td><td>0 (no fuzzy)</td><td>5</td></tr><tr><td>3-5</td><td>1</td><td>5</td></tr><tr><td>6-7</td><td>2</td><td>7</td></tr><tr><td>8+</td><td>3</td><td>20</td></tr></table>\n\n<p><strong>Completion thresholds:</strong></p>\n\n<table><tr><th>Token length</th><th>Max edit distance</th><th>Max results</th></tr><tr><td>< 3</td><td>0</td><td>150</td></tr><tr><td>3-5</td><td>1</td><td>100</td></tr><tr><td>6-7</td><td>2</td><td>50</td></tr><tr><td>8+</td><td>3</td><td>30</td></tr></table>\n\n<p>Score adjustment: <code>compute_correction_score()</code> / <code>compute_completion_score()</code> using Damerau-Levenshtein + phonetic distance + typo distance.</p>\n\n<h3>Language Model</h3>\n\n<p>KenLM n-gram model trained on normalized token sequences from catalog items. Training data: item tokens → stemmed, sorted → space-joined sentences.</p>\n\n<p>Used in QS correction candidate scoring:</p>\n<pre><code>candidate_score(phrase) = log(max(1, LM_score × DAWG_score))</code></pre>\n<p>where <code>LM_score = 10^(kenlm.score(phrase, bos=True, eos=True))</code>.</p>", "variants": [], "source": "products/search_suggestions/current/offline/pipeline/dawg.md", "title": "DAWG, Trigram DB & Vocabulary", "position": 3}, "ss_index": {"html": "<h2>Inverted Index Build</h2>\n\n<p>Per-item token→score entries:</p>\n\n<pre><code>token                    → [(internal_id, score), ...]\nA:{acronym}              → [(internal_id, score), ...]\nR:{token}                → duplicate token entries\nEXACT:{token}            → exact searchable identifiers\nENRICHED:{tokens}        → enriched attribute tokens\nALL:                     → all items (empty query / browse)\nCOLLECTION:{id}          → collection membership\nFACET:{key}:{value}      → facet filter index\nFACET_RANGE:{key}:{val}  → range facet filter</code></pre>\n\n<h3>Score computation pipeline</h3>\n\n<pre><code>raw_score (computed_score from DSI, typically query frequency for search suggestions)\n    │\n    ├── get_suggested_or_computed_score():\n    │     -1 sentinel → default_score\n    │     below DEFAULT_RAW_MIN_SCORE → REJECTION_SCORE (item pruned)\n    │     all_scores_discarded → fallback_to_suggested_score\n    │\n    ├── normalize_score(score, scoring_features):\n    │     zscore = (score - mean) / std_dev\n    │     cap at MAX_ZSCORE=3 (linear stretch in [3σ, 4σ] for outliers)\n    │     new_score = zscore × IDEAL_STD + IDEAL_AVERAGE\n    │     floor at IDEAL_MIN_SCORE (zscore=-2)\n    │\n    └── get_token_scores():\n          Base = normalized item score for all tokens\n          + weighted_keywords_dict adjustments: weight × IDEAL_STD per token\n          + category_keywords_dict adjustments: weight × IDEAL_STD per token (max across groups)\n          + cosine_similarities_weights: similarity × IDEAL_STD per token\n          Token scores: max-merged across all items sharing that token</code></pre>\n\n<h3>Key constants</h3>\n\n<table><tr><th>Constant</th><th>Value</th><th>Description</th></tr><tr><td><code>IDEAL_STD</code></td><td>200,000</td><td>Standard deviation unit</td></tr><tr><td><code>IDEAL_AVERAGE</code></td><td>900,000</td><td>Mean score</td></tr><tr><td><code>IDEAL_MIN_SCORE</code></td><td>~500,000</td><td>Floor (zscore=-2)</td></tr><tr><td><code>MAX_ZSCORE</code></td><td>3</td><td>Cap before linear stretch</td></tr><tr><td><code>MAX_SCORE</code></td><td>1,700,000</td><td>Hard cap = IDEAL_AVERAGE + 4×IDEAL_STD</td></tr><tr><td><code>SOFT_MAX_SCORE</code></td><td>2^31 - 1</td><td>Soft cap (no upper bound)</td></tr><tr><td><code>EXACT_MATCH_SCORE_BOOST</code></td><td>600,000</td><td>= 3×IDEAL_STD</td></tr><tr><td><code>REJECTION_SCORE</code></td><td>-2</td><td>Below this → item pruned</td></tr></table>\n\n<p><strong>Cap types:</strong></p>\n<ul><li><code>HARD</code> (DAWG): <code>[IDEAL_MIN_SCORE, MAX_SCORE]</code> = [500K, 1.7M]</li><li><code>SOFT</code> (Vocabulary/Keyvi): <code>[IDEAL_MIN_SCORE, 2^31-1]</code> (uncapped above)</li><li><code>None</code> (Inverted Index): no capping</li></ul>\n\n<p><strong>Category keywords:</strong> per product-category behavioral weights (token→float from click/conversion data). Applied as <code>max(weight across item's groups) × catkws_multiplier × IDEAL_STD</code>. Feature flag <code>catkws_enable</code> controls.</p>", "variants": [], "source": "products/search_suggestions/current/offline/pipeline/index.md", "title": "Inverted Index Build", "position": 2}, "related": {"html": "<h2>Related Searches & Reformulations</h2>\n\n<h3>BuildRelatedSearches</h3>\n\n<p>Three generation methods:</p>\n\n<p><strong>a. Similar Sessions (<code>get_rs_similar_sessions</code>):</strong></p>\n<ul><li>Queries co-occurring in same session</li><li>Self-join by <code>(query, session_id)</code></li><li>Filters: same-token substrings removed, spaceless equivalents removed, inverted word-order removed</li><li>Levenshtein typo detection: sorted-stopword-free tokens distance > 1</li><li>Min co-occurrence: 5</li><li>Excludes top-5 most popular candidates (avoid generic)</li></ul>\n\n<p><strong>b. Expanding/Refining (<code>get_rs_expanding_refining</code>):</strong></p>\n<ul><li>Expanding: candidate has more tokens, all query tokens ⊆ candidate tokens</li><li>Refining: query has more tokens, all candidate tokens ⊆ query tokens</li><li>Optional category gate (dominant product category must match)</li></ul>\n\n<p><strong>c. Reformulations (V3 only):</strong></p>\n<ul><li>From <code>FindQueryReformulations</code> (session-level query sequences, failed first query)</li><li>Min reformulation count: 3</li></ul>\n\n<p><strong>Versions:</strong> V1, V2, V2_GROUPS, V3, FOR_BROWSE_V1.</p>\n\n<p><strong>Output:</strong> Delta table <code>related_searches</code> — columns: <code>query, related_query, source, priority, clicks, add2carts, shows, co_occurrence</code>. Partitioned by <code>[day, ac_key, tag]</code>.</p>\n\n<h3>Query Reformulations</h3>\n\n<pre><code>Source:    behavioral logs, consecutive search pairs in same session (≤60s gap)\nCondition: first query had no conversions (but can have clicks)\nAggregation: (query, reformulated_query) → counts: sessions, clicked, converted\nEnrichment: top 10 converted items per reformulated query\nOutput:    Delta table query_reformulations, partitioned by [day, period, ac_key]</code></pre>\n\n<p>Used by: related searches (V3), zero-result recommendations, search analytics.</p>\n\n<h3>Query Normalization</h3>\n\n<p><strong>At request time (FAS):</strong></p>\n<pre><code>prefix = prefix.replace('|', '/').lower()   # URL decode + lowercase</code></pre>\n\n<p><strong>For query-items lookup:</strong></p>\n<pre><code>normalized_query = ' '.join(tokenize(query.strip(), client_side_query=True))</code></pre>\n<p>Uses <code>cnstrc_normalizer.tokenizer.tokenize()</code> — language-aware tokenizer (20+ languages, Thai special handling).</p>\n\n<p><strong>At index build time:</strong></p>\n<ul><li>NFKC unicode normalization</li><li>HTML tag stripping (regex)</li><li>Non-word character removal (Unicode-aware)</li><li>Underscore → space</li><li>Stemming: <code>extended_tokenize(term, stem=True, drop_duplicates=True, sort=True, lang=lang)</code></li><li>Double-stemming: two-pass for non-idempotent stemmers (\"mens\" → \"men\" → \"man\")</li><li>NLTK <code>WordNetLemmatizer</code> for English plural handling</li></ul>", "variants": [], "source": "products/search_suggestions/current/offline/pipeline/related.md", "title": "Related Searches & Reformulations", "position": 4}, "ss_scheduling": {"html": "<h2>Scheduling & Feature Flags</h2>\n\n<h3>Airflow Scheduling</h3>\n\n<table><tr><th>Pipeline</th><th>Schedule</th><th>Description</th></tr><tr><td>Search Suggestions update</td><td><code>30 12 <em> </em> *</code> (12:30 UTC)</td><td><code>DailyUpdateAllSearchSuggestionsInDB</code></td></tr><tr><td>Query Reformulations</td><td><code>00 3 <em> </em> *</code> (3:00 UTC)</td><td><code>FrustratedSearchesReportForAll</code></td></tr><tr><td>CES Pretrain FastText</td><td><code>16 0 <em> </em> *</code> (0:16 UTC)</td><td><code>PretrainFastTextForSemanticSearch</code></td></tr><tr><td>Related Searches (CES)</td><td>—</td><td>Via CES inference DAGs (daily)</td></tr><tr><td>Query Items (QRL)</td><td><code>0 3 <em> </em> *</code> (3:00 UTC)</td><td><code>GetQueryItemPairsFromQRL</code></td></tr><tr><td>Search Queries Statistics</td><td>—</td><td>Per-ac_key daily</td></tr><tr><td>Index rebuild</td><td>On trigger</td><td><code>reset_last_update()</code> triggers async rebuild</td></tr></table>\n\n<h3>Core correction features</h3>\n\n<table><tr><th>Feature</th><th>Description</th></tr><tr><td><code>SPELL_CORRECTION</code></td><td>Master toggle for query correction</td></tr><tr><td><code>SEARCH_ONLY_BEST_SUGGESTION</code></td><td>Use only top-1 correction in search</td></tr><tr><td><code>ALWAYS_USE_ALL_SPELLING_CORRECTIONS</code></td><td>Force all corrections (both passes)</td></tr><tr><td><code>DISABLE_SECOND_PASS</code> (QT-286)</td><td>Skip 2nd-pass corrections</td></tr><tr><td><code>USE_KEYVI_CORRECTIONS</code> (QT-124)</td><td>Keyvi FSA alternative to DAWG+Trigram</td></tr><tr><td><code>USE_CORRECTION_FILTERING</code> (QT-137)</td><td>ML CatBoost filter on correction candidates</td></tr><tr><td><code>ENABLE_DECOMPOUNDING</code> (QT-88)</td><td>German compound word splitting</td></tr><tr><td><code>ENABLE_UNIT_HANDLING</code> (QT-191)</td><td>Unit-aware corrections (mm→in)</td></tr><tr><td><code>SKIP_CJK_CORRECTIONS</code> (QT-255)</td><td>Skip corrections for CJK tokens</td></tr><tr><td><code>PREFIX_COMPLETED_EXACT_IDENTIFIERS</code> (QT-42)</td><td>Prefix-complete exact IDs</td></tr><tr><td><code>PREFIX_COMPLETED_FUZZY_SEARCHABLES</code> (QT-29)</td><td>Prefix-complete fuzzy tokens</td></tr></table>\n\n<h3>Ranking/scoring features</h3>\n\n<table><tr><th>Feature</th><th>Description</th></tr><tr><td><code>QUERY_ITEMS</code></td><td>Query→item CTR boosts from DataPipeline</td></tr><tr><td><code>FILTER_ITEMS</code></td><td>Filter→item CTR boosts (browse)</td></tr><tr><td><code>PERSONALIZATION</code></td><td>Master personalization toggle</td></tr><tr><td><code>PERSONALIZATION_BOOST_SIMILARS</code></td><td>Expand personalization via neighbor graph</td></tr><tr><td><code>SAFE_PERSONALIZATION</code></td><td>Cap personalization impact</td></tr><tr><td><code>SEARCHANDIZING</code></td><td>Manual boost/blacklist/slot rules</td></tr><tr><td><code>USE_RERANKER_SERVICE_FOR_AUTOCOMPLETE</code></td><td>ML reranker for autocomplete</td></tr><tr><td><code>USE_RERANKER_SERVICE_FOR_SEARCH</code></td><td>ML reranker for search</td></tr><tr><td><code>USE_COGNITIVE_EMBEDDINGS</code></td><td>CES semantic embedding neighbors</td></tr><tr><td><code>USE_CES_BLENDING</code></td><td>CES+base geometric mean (no reranker)</td></tr><tr><td><code>USE_LLM_LABEL_SORT</code></td><td>Sort by LLM relevance label</td></tr><tr><td><code>DIVERSIFY_RESULTS_SEARCH</code></td><td>Result diversification</td></tr></table>\n\n<h3>Known Limitations</h3>\n\n<ul><li><strong>Offline suggestion generation</strong> — new suggestions appear only after daily pipeline run + index rebuild; no real-time trending</li><li><strong>Deduplication heuristics</strong> — plural/spacing/stem/order dedup can miss semantically duplicate queries or incorrectly merge distinct ones</li><li><strong>Validation via live API</strong> — suggestion validation requires live search API call per candidate; expensive, limits throughput</li><li><strong>TrigramDB coverage</strong> — only covers 95th percentile of query volume; rare/new queries fall back to root-level DAWG traversal (slower)</li><li><strong>Fixed edit distance thresholds</strong> — length-based, not adapted to language or domain</li><li><strong>No learned correction ranking</strong> — harmonic mean × LM score is heuristic</li><li><strong>Query-items boost is static</strong> — updated daily from QRL; no real-time CTR signal</li><li><strong>Personalization limited to history boost</strong> — no learned query-level personalization model</li><li><strong>No cross-section ranking</strong> — sections filled independently and merged by round-robin, not jointly ranked</li><li><strong>Redis cache key ignores personalization</strong> — cache bypasses when personalization params change</li><li><strong>Delta index item limit</strong> — large catalog changes force full rebuild</li><li><strong>Synonym quality</strong> — auto synonyms require review; unreviewed pass by default</li><li><strong>Single language model</strong> — one KenLM per index; no multi-language correction scoring</li><li><strong>No query intent classification</strong> — all prefixes treated uniformly regardless of intent</li></ul>", "variants": [], "source": "products/search_suggestions/current/offline/pipeline/scheduling.md", "title": "Scheduling & Feature Flags", "position": 5}, "suggestions": {"html": "<h2>Suggestion Generation</h2>\n\n<h3>CreateSearchSuggestions</h3>\n\n<p>Source: <code>DedupBehavioralLogs</code> (action=<code>search</code>), per <code>ac_key</code>.</p>\n\n<p><strong>Algorithm:</strong></p>\n<p>1. Filter to search events, count per term, drop terms with <code>count < min_searches_count</code></p>\n<p>2. Construct <code>UserSearch</code> objects (with NLTK <code>WordNetLemmatizer</code> lemmatization)</p>\n<p>3. Four-pass deduplication (<code>reduceByKey</code> on Spark RDD):</p>\n<ul><li><strong>Plural dedup:</strong> key = <code>WordNetLemmatizer.lemmatize(name)</code> (singular form)</li><li><strong>Spacing dedup:</strong> key = <code>''.join(name.split())</code> (strip all spaces)</li><li><strong>Inverted word-order dedup:</strong> key = <code>' '.join(sorted(name.split()))</code></li><li><strong>Stem dedup:</strong> key = <code>extended_tokenize(name, stem=True)</code> (stemmed form)</li></ul>\n<p>4. Merge whitelisted terms (always included regardless of count)</p>\n<p>5. Subtract existing DSI items (5 passes: exact, singular, spaceless, sorted-words, stemmed)</p>\n<p>6. Sort by <code>(count DESC, name ASC)</code></p>\n\n<p><strong>Parameters:</strong></p>\n<pre><code>min_searches_count:  4 (1d period), 3 (multi-day period)\nMAX_SS_LINE_LENGTH:  80 characters\nMIN_TERM_LENGTH:     3 characters\nMAX_SEARCH_WORD_LENGTH: 5 words\nBAD_CHARACTERS:      ['-', ',', ':', ';', '\"', '@', '|']\nnostem_terms:        ['ski', 'skis'] (excluded from stem dedup)</code></pre>\n\n<p><strong>Output:</strong> S3 CSV <code>{ac_key}/{period}_period.csv</code> — columns: <code>name, count</code>.</p>\n\n<h3>PrepNewSearchSuggestionsForDB</h3>\n\n<p>Validates candidates against live search API.</p>\n\n<p><strong>Algorithm:</strong></p>\n<p>1. Batch search (16 per batch, 64 partitions, ThreadPool) via autocomplete API</p>\n<p>2. Validation per suggestion (<code>is_valid_ss</code>):</p>\n<ul><li>Reject HTML in name</li><li>Check against blacklist (tokenized stem matching)</li><li>Verify: ≥1 result item's <code>matched_terms</code> is a subset of suggestion tokens</li><li>Two matching modes: <code>_match_basic()</code> (single-stem), <code>_match_extended()</code> (synonym resolution, double-stemming)</li></ul>\n<p>3. Enrichment:</p>\n<ul><li><code>get_top_groups()</code>: top 3 product category groups from API results</li><li><code>get_top_facets_sets()</code>: inherits facet values from top products</li><li>Image URL from first result item</li></ul>\n<p>4. Raise <code>SSValidationError</code> if invalid ratio exceeds <code>max_invalid_ss_ratio=0.5</code></p>\n\n<h3>UpdateSearchSuggestionsInDB</h3>\n\n<p><strong>Algorithm:</strong></p>\n<p>1. Re-validate existing suggestions (<code>UpdateExistingSearchSuggestions</code>) — deactivate orphaned</p>\n<p>2. Validate new candidates (<code>PrepNewSearchSuggestionsForDB</code>)</p>\n<p>3. Merge 1d + period outputs; dedup by name; assign A/B test cells:</p>\n<ul><li><code>cell_a</code> = from 1d window only</li><li><code>cell_b</code> = from period window only</li><li><code>cell_c</code> = in both (intersection)</li></ul>\n<p>4. Upload to catalog API in chunks of 1000 (250 for slow customers)</p>\n<p>5. <code>reset_last_update()</code> → triggers index rebuild</p>\n\n<p><strong>Parameters:</strong></p>\n<pre><code>max_deactivated_ratio: 0.35\nnum_top_groups:        3\nnum_results:           10 (API call limit per suggestion)</code></pre>\n\n<p><strong>Blacklisting:</strong> per-ac_key YAML (<code>ss_blacklisted_terms_path</code>) + inline list (<code>ss_blacklisted_terms</code>).</p>\n\n<p><strong>Scheduling:</strong> <code>30 12 <em> </em> *</code> (12:30 UTC daily), <code>DailyUpdateAllSearchSuggestionsInDB</code>.</p>", "variants": [], "source": "products/search_suggestions/current/offline/pipeline/suggestions.md", "title": "Suggestion Generation", "position": 1}}, "current_online": {"caching": {"html": "<h2>Caching & Delta Index</h2>\n\n<h3>Redis cache (SABR Caching)</h3>\n\n<ul><li>Feature: <code>SABR_CACHING</code></li><li><strong>Write:</strong> after serving, if <code>processing_time > threshold_ms</code> (default 500ms) → write to Redis with TTL (default 300s)</li><li><strong>Read:</strong> check Redis before processing; return immediately on hit (<code>Results-Cache-Used: true</code>)</li><li><strong>Key:</strong> path + sorted args + request_type (strips personalization params: <code>ui</code>, <code>i</code>, <code>s</code>, <code>c</code>)</li><li><strong>Value:</strong> JSON → zlib compressed (level 3)</li><li><strong>Bypass:</strong> when searchandizing rules, blacklist, explain, or <code>DISABLE_CACHE</code> active</li><li>Redis: separate read-replica and write connections</li></ul>\n\n<h3>Batch pre-warming</h3>\n\n<p><code>ResultsCacheDB.set_batch()</code> via Redis pipeline. Called with pre-computed responses for popular queries (e.g., from <code>/v1/batch_autocomplete</code> for top-N queries).</p>\n\n<h3>Delta Index</h3>\n\n<p>Incremental index for fast item updates without full rebuild.</p>\n\n<p><strong>Build:</strong></p>\n<ul><li>Opt-in per customer: <code>build_delta_index=True</code></li><li>Fetches only DSIs updated since primary index build (<code>min_updated_at</code>)</li><li>Aborts if changed items exceed <code>item_count × incremental_index_items_changed_ratio</code> → falls back to full rebuild</li><li>Includes deactivated items (tombstones)</li></ul>\n\n<p><strong>Serve:</strong></p>\n<p>Delta stores specific key-value datasets:</p>\n<pre><code>DELTA_DATA_SETS = [\"dsi_id_to_customer_id\", \"customer_id_to_dsi_id\",\n                   \"customer_id_to_internal_id_range\", \"deactivated_dsis\"]</code></pre>\n\n<p>Merge logic: delta wins for keys it has; primary covers the rest. Items present in delta's \"ALL:\" token skip list are excluded from primary index results.</p>\n\n<p>Feature: <code>USE_DELTA_INDEX</code> passed via gRPC to index service.</p>", "variants": [], "source": "products/search_suggestions/current/online/serving/caching.md", "title": "Caching & Delta Index", "position": 6}, "ces_ac": {"html": "<h2>CES Integration for Autocomplete</h2>\n\n<h3>Semantic neighbors</h3>\n\n<p><code>CESGateway.get_cognitive_embeddings_neighbours()</code>:</p>\n<ul><li>Tokenizes query: <code>ces_tokenize(query)</code></li><li>gRPC <code>GetNearestNeighbours</code> to CES service</li><li>Requests <code>max_num_neighbours</code> (default 20) items</li><li>Filters by <code>max_distance</code> (default <code>COGNITIVE_EMBEDDINGS_DISTANCE_THRESHOLD</code>)</li><li>Adaptive threshold: <code>keep if (distance - best_distance) < adaptive_threshold_delta</code></li></ul>\n\n<p>Score conversion:</p>\n<pre><code>score = IDEAL_AVERAGE + 3 × IDEAL_STD × (1 - min(distance, 1.0))</code></pre>\n<p>= 900,000 + 600,000 × similarity. Range: [900K, 1.5M].</p>\n\n<h3>CES inverted index mixing</h3>\n\n<p>When CES results present: inverted index results capped to <code>num_inverted_index_result_when_used</code> (default 10). CES items injected alongside. If <code>bury_results=True</code>, CES items placed at end.</p>\n\n<h3>Online filtering model</h3>\n\n<p>Secondary CES call: <code>get_online_filtering_model_similarities()</code>. Items below <code>online_filtering_threshold</code> removed (if CES-sourced) or buried.</p>\n\n<h3>Related searches</h3>\n\n<p><code>CESGateway.get_related_entities()</code> for search/browse:</p>\n<ul><li><code>related_searches</code>: semantically similar query strings</li><li><code>related_browse_pages</code>: related faceted browse pages</li></ul>\n\n<p>Only for <code>ACRequestType.SEARCH</code> and <code>ACRequestType.BROWSE</code> — not autocomplete.</p>", "variants": [], "source": "products/search_suggestions/current/online/serving/ces.md", "title": "CES Integration", "position": 4}, "keysets": {"html": "<h2>KeySets & Synonyms</h2>\n\n<h3>GetKeysetsAndBoosts</h3>\n\n<p>Takes <code>CorrectionResult</code> list, expands with synonyms/stems → <code>KeySet</code> tree.</p>\n\n<p><strong>KeySet structure:</strong></p>\n<pre><code>KeySet {\n    repeated KeySetLeaf leaf_children;    // terminal terms\n    repeated KeySet keyset_children;      // nested sub-sets\n    string keyset_operator;               // \"AND\", \"OR\"\n    bool is_truncated;\n}\nKeySetLeaf {\n    string keyset_term;                   // token string for index lookup\n    uint32 keyset_flag;                   // score adjustment flag\n}</code></pre>\n\n<p><strong>Boosts:</strong> <code>List[(token_list, weight, boost_type)]</code> — per-keyset fuzzy correction weights. Exact matches get higher weights than fuzzy corrections at inverted index query time.</p>\n\n<p>KeySet size limit: 1000 leaves.</p>\n\n<h3>Synonym Types</h3>\n\n<table><tr><th>Type</th><th>Source</th><th>Field flags</th></tr><tr><td>Manual synonyms</td><td>Customer dashboard</td><td><code>auto_generated=False</code></td></tr><tr><td>Auto synonyms</td><td>ML-generated</td><td><code>auto_generated=True</code></td></tr><tr><td>Auto-reviewed synonyms</td><td>ML + online review</td><td><code>autoreviewed_as=True/False/None</code></td></tr><tr><td>One-way synonyms</td><td>Manual/auto</td><td><code>base_ngram → related_ngram</code> (directional)</td></tr><tr><td>Weighted relations</td><td>Manual/auto</td><td><code>base → related + weight</code></td></tr><tr><td>Unit synonyms (QT-191)</td><td>Runtime</td><td><code>\"12mm\" → \"0.47 in\"</code> (measurement conversion)</td></tr></table>\n\n<h3>Data structure (SynonymData)</h3>\n\n<pre><code>synonym_words_to_groups: {first_word → {(phrase, group_id)}}     # two-way groups\nsynonym_groups: {group_id → {all phrases}}                        # bidirectional\none_way_synonyms: {first_word → {(relation_id, base, related, auto, date, state, autoreviewed)}}\nweighted_relations: {first_word → {(base, related, weight, auto, date, state, autoreviewed)}}</code></pre>\n\n<h3>Expansion in QueryGraph</h3>\n\n<p><code>QueryGraph</code> (DAG): nodes = tokens/token-groups, edges = \"follows\" relationship.</p>\n<ul><li>Two-way synonyms: add parallel paths (symmetric)</li><li>One-way synonyms: add <code>related_ngram</code> as alternative when query contains <code>base_ngram</code></li><li>Weighted relations: add term with boost weight</li></ul>\n\n<h3>Synonym feature flags</h3>\n\n<table><tr><th>Feature</th><th>Controls</th></tr><tr><td><code>SUPPRESS_AC_QUERY_SYNONYMS</code></td><td>Disable synonyms in autocomplete corrections</td></tr><tr><td><code>SUPPRESS_SEARCH_QUERY_SYNONYMS</code></td><td>Disable synonyms in search corrections</td></tr><tr><td><code>SYNONYMS_FILTERED_BY_DATE</code></td><td><code>synonyms_not_newer_than</code> cutoff</td></tr><tr><td><code>USE_AUTOREVIEWED_SYNONYMS</code> (QT-233)</td><td>Enable auto-reviewed filter logic</td></tr></table>\n\n<p>Filtering: <code>auto_generated + use_autoreviewed_synonyms → autoreviewed_as is not False</code> (None = unseen = pass).</p>", "variants": [], "source": "products/search_suggestions/current/online/serving/keysets.md", "title": "KeySets & Synonyms", "position": 3}, "ss_personalization": {"html": "<h2>Personalization</h2>\n\n<h3>PersonalizationItemsBooster</h3>\n\n<p>Same as search/recommendations (shared <code>PersonalizationItemsBooster</code> from <code>common/</code>):</p>\n<pre><code>weight(item, action) = 2 × boost_std(action) × (1 - 0.5^count)</code></pre>\n<p>Per-item final weight = max across actions. Applied as additive score boost at query time.</p>\n\n<h3>Similar items expansion</h3>\n\n<p>Feature <code>PERSONALIZATION_BOOST_SIMILARS</code>: for each history item, fetch co-occurrence/neighbor items via <code>item_to_items_connector</code>. Apply <code>weight_multiplier</code> to their boost weights.</p>\n\n<h3>User segments</h3>\n\n<p>Feature <code>APPLY_USER_SEGMENT</code>: ML-generated segments from <code>UserSegmentsProvider</code> → packed as tags → influence searchandizing rules.</p>\n\n<h3>Safe personalization</h3>\n\n<p>Feature <code>SAFE_PERSONALIZATION</code>: caps max boost to prevent irrelevant items surfacing due to over-personalization.</p>", "variants": [], "source": "products/search_suggestions/current/online/serving/personalization.md", "title": "Personalization", "position": 5}, "query_flow": {"html": "<h2>Query Execution Flow</h2>\n\n<h3>Request flow</h3>\n\n<pre><code>/v1/autocomplete/&lt;prefix&gt;\n    │\n    ├── prefix = prefix.replace('|', '/').lower()\n    ├── Redis cache check (if SABR_CACHING enabled)\n    ├── UserSegmentsFetcher (async) → tags\n    ├── UserBoostedTermsFetcher (async, per section) → boosted_terms\n    ├── RefinedQueryRules → whitelist/blacklist/boost/slot\n    │\n    └── Per section (parallel ThreadPool):\n          TermsProcessor.get_results()\n            │\n            ├── QS.get_spelling_corrections(prefix) → corrections\n            ├── QS.get_keysets_and_boosts(corrections) → (keysets, boosts)\n            ├── DataPipelineService.get_query_boosted_terms(best_correction) → query_items\n            ├── CESGateway (optional) → semantic neighbors\n            ├── InvertedIndex.get_results_for_iterator(keysets, boosts, boosted_terms)\n            │     → first-pass results\n            ├── If first-pass insufficient → second-pass with second_run_corrections\n            ├── RerankerGateway (optional) → ML re-ranking\n            └── SponsoredListingsGateway → slotted ads</code></pre>\n\n<h3>Score contributions at query time</h3>\n\n<p>1. <strong>Base score:</strong> from inverted index (precomputed at index build)</p>\n<p>2. <strong>Fuzzy boost weights:</strong> from QS keyset boosts (fuzzy corrections → lower weight than exact)</p>\n<p>3. <strong>Query-items boost:</strong> <code>query→{item: weight}</code> from DataPipelineService (click/purchase CTR attribution)</p>\n<p>4. <strong>Personalization boost:</strong> <code>PersonalizationItemsBooster</code> weights from user history</p>\n<p>5. <strong>Similar items boost:</strong> co-occurrence items via <code>PERSONALIZATION_BOOST_SIMILARS</code></p>\n<p>6. <strong>Searchandizing rules:</strong> manual boost/blacklist/slot: <code>IDEAL_STD × BOOST_RULE_MULTIPLIER(4) × boost_value</code></p>\n<p>7. <strong>CES boost:</strong> embedding distance → score: <code>IDEAL_AVERAGE + 3 × IDEAL_STD × (1 - distance)</code></p>\n<p>8. <strong>Reranker (optional):</strong> full ML re-scoring</p>\n\n<h3>Multi-section result merging</h3>\n\n<p>Over-fetch: <code>ceil(num_results / 2)</code> per section when multiple sections exist.</p>\n\n<p>Limiting/round-robin:</p>\n<p>1. If total results ≤ max_results → no trimming</p>\n<p>2. Base allocation: <code>floor(max_results / num_sections)</code> per section</p>\n<p>3. Remaining slots distributed one-at-a-time cycling through sections (alphabetical order)</p>\n<p>4. Section with no remaining items skipped on cycle turn</p>\n\n<h3>Batch Autocomplete</h3>\n\n<pre><code>GET /v1/batch_autocomplete?q=foo&amp;q=bar&amp;num_results=5</code></pre>\n\n<p>Iterates each <code>q</code> sequentially, calls <code>autocomplete_prefix_impl()</code> per prefix. Shares all other params. Per-prefix timeout: returns <code>status_code=504</code> for timed-out prefixes, others continue.</p>\n\n<p>Permission: <code>internal.batch_autocomplete</code> (internal-only). Used for cache pre-warming and batch pre-fetch.</p>", "variants": [], "source": "products/search_suggestions/current/online/serving/query_flow.md", "title": "Query Execution Flow", "position": 1}, "spelling": {"html": "<h2>Spelling Correction (Query Service)</h2>\n\n<h3>Architecture</h3>\n\n<p>Query Service (QS) — Rust/C++ gRPC service. Two RPC methods:</p>\n\n<p>1. <code>GetSpellingCorrections</code> → <code>GetSpellingCorrectionsResponse</code></p>\n<p>2. <code>GetKeysetsAndBoosts</code> → <code>GetKeysetsAndBoostsResponse</code></p>\n\n<h3>GetSpellingCorrections</h3>\n\n<p><strong>Input:</strong> <code>(ac_id, query, is_autocomplete, is_search_suggestion_section, feature_params)</code></p>\n\n<p><strong>Output:</strong></p>\n<pre><code>GetSpellingCorrectionsResponse {\n    PhraseCorrection original_phrase;\n    string best_correction;\n    bool are_all_tokens_exact_searchable;\n    repeated CorrectionResult first_run_corrections;\n    repeated CorrectionResult second_run_corrections;\n    CorrectionExplanation explanation;\n}</code></pre>\n\n<p><strong>TokenCorrection:</strong></p>\n<pre><code>TokenCorrection {\n    string raw_token;              // what user typed\n    string correction;             // corrected form\n    string normalized_correction;  // stemmed form\n    uint32 score;                  // DAWG/Keyvi score\n    uint32 score_adjustment;       // EXACT_MATCH=3, BOOST=5, IDENTITY=1\n    bool is_exact_match;           // exact searchable identifier\n    bool is_completion;            // prefix-completed (autocomplete mode)\n    bool is_fuzzy_match;\n    bool is_join;                  // joined two tokens\n    bool is_acronym;\n    bool is_numeric;\n    bool is_cjk;\n}</code></pre>\n\n<p><strong>Phrase scoring:</strong> harmonic mean of token scores:</p>\n<pre><code>score(phrase) = N / (1/s₁ + 1/s₂ + ... + 1/sₙ)</code></pre>\n\n<h3>First-Pass vs Second-Pass</h3>\n\n<ul><li><strong>First-pass corrections:</strong> primary candidates from a single QS call</li><li><strong>Second-pass corrections:</strong> backup candidates, used only if first-pass retrieval returns insufficient results:</li><li>Autocomplete: <code>< 6</code> unfiltered results</li><li>Search: <code>< 3</code> unfiltered results</li><li>Second-pass disabled if <code>always_only_best_suggestion=True</code> or <code>disable_second_pass=True</code> (QT-286)</li><li>Feature <code>ALWAYS_USE_ALL_SPELLING_CORRECTIONS</code> forces both passes always</li></ul>", "variants": [], "source": "products/search_suggestions/current/online/serving/spelling.md", "title": "Spelling Correction (Query Service)", "position": 2}}}, "diagrams": [{"id": "current_offline", "label": "Curren 293b\" font-size=\"10\">Inverted Index</text>\n  </g>\n  <g data-click=\"dawg\" style=\"cursor:pointer\">\n    <rect x=\"195\" y=\"190\" width=\"155\" height=\"32\" rx=\"5\" fill=\"#f3f0ff\" stroke=\"#7c3aed\"/>\n    <text x=\"272\" y=\"210\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"10\">DAWG</text>\n  </g>\n  <g data-click=\"dawg\" style=\"cursor:pointer\">\n    <rect x=\"25\" y=\"230\" width=\"155\" height=\"32\" rx=\"5\" fill=\"#fff9db\" stroke=\"#f59f00\"/>\n    <text x=\"102\" y=\"250\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"10\">Trigram DB</text>\n  </g>\n  <g data-click=\"dawg\" style=\"cursor:pointer\">\n    <rect x=\"195\" y=\"230\" width=\"155\" height=\"32\" rx=\"5\" fill=\"#e6fcf5\" stroke=\"#2b8a3e\"/>\n    <text x=\"272\" y=\"250\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"10\">Vocabulary (Keyvi)</text>\n  </g>\n  <g data-click=\"dawg\" style=\"cursor:pointer\">\n    <rect x=\"25\" y=\"270\" width=\"155\" height=\"32\" rx=\"5\" fill=\"#f8fafc\" stroke=\"#94a3b8\"/>\n    <text x=\"102\" y=\"290\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"10\">Language Model</text>\n  </g>\n  <g data-click=\"ss_index\" style=\"cursor:pointer\">\n    <rect x=\"195\" y=\"270\" width=\"155\" height=\"32\" rx=\"5\" fill=\"#fff5f5\" stroke=\"#e03131\"/>\n    <text x=\"272\" y=\"290\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"10\">Query Items KV</text>\n  </g>\n\n  <text x=\"190\" y=\"320\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"9\">z-score normalization + keyword + category + embedding adjustments</text>\n\n  <line x1=\"190\" y1=\"328\" x2=\"190\" y2=\"348\" stroke=\"#475569\" stroke-width=\"1.5\" marker-end=\"url(#b)\"/>\n\n  <!-- Related Searches -->\n  <g data-click=\"related\" style=\"cursor:pointer\">\n    <rect x=\"10\" y=\"351\" width=\"360\" height=\"100\" rx=\"8\" fill=\"#f8fafc\" stroke=\"#64748b\"/>\n    <text x=\"190\" y=\"371\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"11\" font-weight=\"bold\">Related Searches & Reformulations</text>\n    <text x=\"190\" y=\"393\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"9\">Similar sessions (co-occurring queries)</text>\n    <text x=\"190\" y=\"408\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"9\">Expanding/refining (subset/superset tokens)</text>\n    <text x=\"190\" y=\"423\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"9\">Query reformulations (consecutive failed→success pairs)</text>\n    <text x=\"190\" y=\"438\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"9\">→ Delta table → CES service related_searches index</text>\n  </g>\n\n  <line x1=\"190\" y1=\"451\" x2=\"190\" y2=\"471\" stroke=\"#475569\" stroke-width=\"1.5\" marker-end=\"url(#b)\"/>\n\n  <!-- Synonyms -->\n  <g data-click=\"keysets\" style=\"cursor:pointer\">\n    <rect x=\"60\" y=\"474\" width=\"260\" height=\"55\" rx=\"6\" fill=\"#f8fafc\" stroke=\"#64748b\"/>\n    <text x=\"190\" y=\"497\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"11\" font-weight=\"bold\">Synonyms</text>\n    <text x=\"190\" y=\"515\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"9\">manual + auto + auto-reviewed + one-way + weighted</text>\n  </g>\n\n  <line x1=\"190\" y1=\"529\" x2=\"190\" y2=\"549\" stroke=\"#475569\" stroke-width=\"1.5\" marker-end=\"url(#b)\"/>\n\n  <!-- Scheduling -->\n  <g data-click=\"ss_scheduling\" style=\"cursor:pointer\">\n    <rect x=\"60\" y=\"552\" width=\"260\" height=\"55\" rx=\"6\" fill=\"#f7f3eb\" stroke=\"#64748b\"/>\n    <text x=\"190\" y=\"575\" text-anchor=\"middle\" fill=\"#1e293b\" font-size=\"11\" font-weight=\"bold\">Airflow Scheduling</text>\n    <text x=\"190\" y=\"593\" text-anchor=\"middle\" fill=\"#64748b\" font-size=\"9\">suggestions: 12:30 UTC | reformulations: 3:00 UTC | index: on-trigger</text>\n  </g>\n</svg>"}, {"id": "current_online", "label": "Current Online", "group": "current", "sublabel": "Online", "svg": "<svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 380 680\
